<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealReel · Офлайн прототип</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            width: 380px;
            height: 720px;
            background: #1a1a1a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        :root {
            --bg: #1a1a1a;
            --surface: #2d2d2d;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #5f9ea0;
            --border: #3a3a3a;
        }

        /* Шапка */
        .header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
        }

        .daily {
            background: rgba(95,158,160,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* Stories */
        .stories-section {
            padding: 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .stories {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .stories::-webkit-scrollbar {
            display: none;
        }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(45deg, var(--accent), #7bb5b7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 3px solid var(--accent);
        }

        .story-add {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: var(--surface);
            border: 2px dashed var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--accent);
        }

        .story-name {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Reels */
        .reels {
            flex: 1;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: #000;
        }

        .reel {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #111;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .reel video, .reel .reel-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: linear-gradient(45deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .reel-content {
            position: relative;
            z-index: 2;
            color: white;
            width: 100%;
        }

        .reel-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reel-author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .reel-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 3;
        }

        .reel-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .reel-action span {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Навігація */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 12px;
            flex: 1;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item span {
            font-size: 22px;
            margin-bottom: 2px;
        }

        /* Екрани */
        .screen {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* Профіль */
        .profile {
            padding: 16px;
            overflow-y: auto;
            color: var(--text);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
        }

        .profile-nick {
            color: var(--text-secondary);
        }

        .profile-bio {
            background: var(--surface);
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .profile-stat {
            text-align: center;
            flex: 1;
            cursor: pointer;
        }

        .profile-stat-value {
            font-weight: 700;
            font-size: 18px;
        }

        .profile-stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .profile-btn {
            flex: 1;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .profile-btn.primary {
            background: var(--accent);
            border: none;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 16px;
        }

        .post-thumb {
            aspect-ratio: 1;
            background: var(--surface);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* Passport */
        .passport {
            padding: 20px;
            color: var(--text);
        }

        .visa-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .visa-item {
            background: linear-gradient(135deg, var(--accent), #7bb5b7);
            padding: 15px 5px;
            border-radius: 12px;
            text-align: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .visa-icon {
            font-size: 30px;
            margin-bottom: 5px;
        }

        /* Чати */
        .chat-list {
            padding: 10px;
            color: var(--text);
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-preview {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Кімната чату */
        .chat-room {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg);
        }

        .chat-header {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-back {
            cursor: pointer;
            font-size: 24px;
            color: var(--text);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }

        .message.mine {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
            outline: none;
        }

        .chat-send {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 22px;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        /* Модалка */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            display: none;
        }

        .modal.active {
            display: block;
        }

        .modal-title {
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--surface-hover, #3d3d3d);
            color: var(--text);
            cursor: pointer;
        }

        .modal-btn.save {
            background: var(--accent);
            color: white;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="phone">
        <!-- Шапка -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="logo">RealReel</span>
                <span class="daily" id="dailyFeature" onclick="changeDaily()">67</span>
            </div>
            <div class="header-icons">
                <div class="icon-btn" onclick="openAddPost()">➕</div>
                <div class="icon-btn" onclick="toggleNotifications()">🔔</div>
            </div>
        </div>

        <!-- ОСНОВНИЙ ЕКРАН (Stories + Reels) -->
        <div class="screen active" id="reelsScreen">
            <div class="stories-section">
                <div class="stories" id="storiesContainer"></div>
            </div>
            <div class="reels" id="reelsContainer"></div>
        </div>

        <!-- Профіль -->
        <div class="screen" id="profileScreen">
            <div class="profile">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar" onclick="changeAvatar()">👤</div>
                    <div>
                        <div class="profile-name" id="profileName">Олександр</div>
                        <div class="profile-nick" id="profileNick">@oleksandr</div>
                    </div>
                </div>
                <div class="profile-bio" id="profileBio" onclick="editBio()">
                    💻 Розробник. Створюю RealReel
                </div>
                <div class="profile-stats">
                    <div class="profile-stat" onclick="showSubscriptions('followers')">
                        <div class="profile-stat-value" id="followersCount">128</div>
                        <div class="profile-stat-label">підписники</div>
                    </div>
                    <div class="profile-stat" onclick="showSubscriptions('following')">
                        <div class="profile-stat-value" id="followingCount">56</div>
                        <div class="profile-stat-label">підписки</div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="profile-btn primary" id="editProfileBtn" onclick="openEditProfile()">Редагувати</button>
                </div>
                <div class="posts-grid" id="userPosts">
                    <div class="post-thumb">📸</div>
                    <div class="post-thumb">📸</div>
                    <div class="post-thumb">📸</div>
                </div>
            </div>
        </div>

        <!-- Passport StiQ -->
        <div class="screen" id="passportScreen">
            <div class="passport">
                <h2 style="color: var(--accent); text-align: center;">Passport StiQ</h2>
                <div class="visa-grid" id="visaGrid"></div>
            </div>
        </div>

        <!-- Чати -->
        <div class="screen" id="chatScreen">
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Навігація -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="navigate('reelsScreen', this)">
                <span>🎬</span>
                <span>Reels</span>
            </div>
            <div class="nav-item" onclick="navigate('passportScreen', this)">
                <span>🛂</span>
                <span>Passport</span>
            </div>
            <div class="nav-item" onclick="navigate('profileScreen', this)">
                <span>👤</span>
                <span>Профіль</span>
            </div>
            <div class="nav-item" onclick="navigate('chatScreen', this)">
                <span>💬</span>
                <span>Чати</span>
            </div>
        </div>

        <!-- Модалка редагування профілю -->
        <div class="modal" id="editProfileModal">
            <div class="modal-title">Редагувати профіль</div>
            <input type="text" class="modal-input" id="editNameInput" placeholder="Ім'я">
            <input type="text" class="modal-input" id="editNickInput" placeholder="Нікнейм">
            <textarea class="modal-input" id="editBioInput" placeholder="Про себе" rows="3"></textarea>
            <div class="modal-actions">
                <button class="modal-btn save" onclick="saveProfile()">Зберегти</button>
                <button class="modal-btn" onclick="closeModal()">Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ДАНІ =====
        let currentUser = {
            name: 'Олександр',
            nick: 'oleksandr',
            bio: '💻 Розробник. Створюю RealReel',
            avatar: '👤',
            followers: 128,
            following: 56
        };

        let stories = [
            { id: 1, name: 'Анна', emoji: '🌸' },
            { id: 2, name: 'Макс', emoji: '🔥' },
            { id: 3, name: 'Катя', emoji: '⭐' }
        ];

        let reels = [
            { id: 1, author: 'Анна', desc: '🌸 Весна', likes: 234, comments: 12, emoji: '🌸' },
            { id: 2, author: 'Макс', desc: '🏔️ Гори', likes: 567, comments: 34, emoji: '🏔️' },
            { id: 3, author: 'Юля', desc: '☕ Кава', likes: 89, comments: 5, emoji: '☕' }
        ];

        let visas = [
            { id: 1, place: 'Париж', icon: '🗼' },
            { id: 2, place: 'Рим', icon: '🏛️' },
            { id: 3, place: 'Нью-Йорк', icon: '🗽' }
        ];

        let chats = [
            { id: 1, name: 'Анна', lastMsg: 'Привіт!', avatar: '👩' },
            { id: 2, name: 'Макс', lastMsg: 'Як справи?', avatar: '👨' }
        ];

        let messages = {
            1: [
                { text: 'Привіт!', mine: false },
                { text: 'Як ти?', mine: true }
            ]
        };

        let currentChatId = 1;
        let dailyFeatures = ['67', '☀️', '🔥', '⭐', '🎯'];
        let featureIndex = 0;

        // ===== ЗАВАНТАЖЕННЯ =====
        function loadStories() {
            const container = document.getElementById('storiesContainer');
            container.innerHTML = `
                <div class="story" onclick="addStory()">
                    <div class="story-add">+</div>
                    <span class="story-name">Ваша</span>
                </div>
                ${stories.map(s => `
                    <div class="story" onclick="viewStory(${s.id})">
                        <div class="story-avatar">${s.emoji}</div>
                        <span class="story-name">${s.name}</span>
                    </div>
                `).join('')}
            `;
        }

        function loadReels() {
            const container = document.getElementById('reelsContainer');
            container.innerHTML = reels.map(r => `
                <div class="reel">
                    <div class="reel-placeholder">${r.emoji}</div>
                    <div class="reel-content">
                        <div class="reel-author">
                            <div class="reel-author-avatar">👤</div>
                            <span>${r.author}</span>
                        </div>
                        <div>${r.desc}</div>
                    </div>
                    <div class="reel-actions">
                        <div class="reel-action" onclick="likeReel(${r.id})">
                            <span>❤️</span>
                            <span>${r.likes}</span>
                        </div>
                        <div class="reel-action" onclick="commentReel(${r.id})">
                            <span>💬</span>
                            <span>${r.comments}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadVisas() {
            const grid = document.getElementById('visaGrid');
            grid.innerHTML = visas.map(v => `
                <div class="visa-item" onclick="showVisa('${v.place}')">
                    <div class="visa-icon">${v.icon}</div>
                    <div>${v.place}</div>
                </div>
            `).join('');
        }

        function loadChats() {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item" onclick="openChat(${c.id})">
                    <div class="chat-avatar">${c.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${c.name}</div>
                        <div class="chat-preview">${c.lastMsg}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateProfile() {
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileNick').textContent = '@' + currentUser.nick;
            document.getElementById('profileBio').textContent = currentUser.bio;
            document.getElementById('profileAvatar').textContent = currentUser.avatar;
            document.getElementById('followersCount').textContent = currentUser.followers;
            document.getElementById('followingCount').textContent = currentUser.following;
        }

        // ===== НАВІГАЦІЯ =====
        window.navigate = function(screenId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (element) element.classList.add('active');
            
            if (screenId === 'passportScreen') loadVisas();
            if (screenId === 'chatScreen') loadChats();
        };

        // ===== СТОРІС =====
        window.addStory = () => alert('Додати історію (заглушка)');
        window.viewStory = (id) => alert('Перегляд історії ' + id);

        // ===== REELS =====
        window.likeReel = (id) => {
            const reel = reels.find(r => r.id === id);
            if (reel) {
                reel.likes++;
                loadReels();
            }
        };
        window.commentReel = (id) => alert('Коментарі до рилса ' + id);

        // ===== PASSPORT =====
        window.showVisa = (place) => alert('Віза в ' + place);

        // ===== ЧАТИ =====
        window.openChat = (chatId) => {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            
            // Створюємо екран чату
            let chatRoom = document.getElementById('chatRoom');
            if (!chatRoom) {
                chatRoom = document.createElement('div');
                chatRoom.id = 'chatRoom';
                chatRoom.className = 'screen';
                chatRoom.innerHTML = `
                    <div class="chat-room">
                        <div class="chat-header">
                            <span class="chat-back" onclick="closeChat()">←</span>
                            <div class="chat-name" id="chatRoomName"></div>
                        </div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Написати...">
                            <button class="chat-send" onclick="sendMessage()">➤</button>
                        </div>
                    </div>
                `;
                document.querySelector('.phone').appendChild(chatRoom);
            }

            document.getElementById('chatRoomName').textContent = chat.name;
            loadMessages(chatId);
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('chatRoom').classList.add('active');
        };

        window.closeChat = () => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('chatScreen').classList.add('active');
        };

        function loadMessages(chatId) {
            const container = document.getElementById('chatMessages');
            const msgs = messages[chatId] || [];
            container.innerHTML = msgs.map(m => `
                <div class="message ${m.mine ? 'mine' : 'other'}">${m.text}</div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.sendMessage = () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            if (!messages[currentChatId]) messages[currentChatId] = [];
            messages[currentChatId].push({ text, mine: true });
            
            loadMessages(currentChatId);
            input.value = '';

            // Оновлюємо останнє повідомлення в списку чатів
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) chat.lastMsg = text;
        };

        // ===== ПРОФІЛЬ =====
        window.openEditProfile = () => {
            document.getElementById('editNameInput').value = currentUser.name;
            document.getElementById('editNickInput').value = currentUser.nick;
            document.getElementById('editBioInput').value = currentUser.bio;
            document.getElementById('editProfileModal').classList.add('active');
        };

        window.saveProfile = () => {
            currentUser.name = document.getElementById('editNameInput').value;
            currentUser.nick = document.getElementById('editNickInput').value;
            currentUser.bio = document.getElementById('editBioInput').value;
            updateProfile();
            closeModal();
        };

        window.changeAvatar = () => {
            const avatars = ['👤', '👩', '👨', '🧑', '👱'];
            currentUser.avatar = avatars[Math.floor(Math.random() * avatars.length)];
            updateProfile();
        };

        window.editBio = () => {
            const newBio = prompt('Введіть новий опис:', currentUser.bio);
            if (newBio !== null) {
                currentUser.bio = newBio;
                updateProfile();
            }
        };

        window.showSubscriptions = (type) => {
            alert(`Відкрити ${type === 'followers' ? 'підписників' : 'підписки'} (заглушка)`);
        };

        // ===== МОДАЛКИ =====
        window.openAddPost = () => alert('Додати пост (заглушка)');
        window.toggleNotifications = () => alert('Сповіщення (заглушка)');
        window.closeModal = () => {
            document.getElementById('editProfileModal').classList.remove('active');
        };

        // ===== ДНЕВНА ФІЧА =====
        window.changeDaily = () => {
            featureIndex = (featureIndex + 1) % dailyFeatures.length;
            document.getElementById('dailyFeature').textContent = dailyFeatures[featureIndex];
        };

        // ===== ІНІЦІАЛІЗАЦІЯ =====
        window.onload = () => {
            loadStories();
            loadReels();
            loadVisas();
            loadChats();
            updateProfile();
        };
    </script>
</body>
</html>
