```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>RENITEA — соцсеть</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ====== БАЗА / ТВОЙ СТИЛЬ RENITEA (уплотнённая версия) ====== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background-color .15s ease, transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    body {
      color: #111;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    body.theme-paper {
      background: #f5f0e6;
      background-image:
        url("https://www.transparenttextures.com/patterns/paper-fibers.png"),
        radial-gradient(circle at 0 0, rgba(0,0,0,0.04) 0, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.04) 0, transparent 40%);
      background-size: auto, 100% 100%, 100% 100%;
    }

    /* LOGIN */
    .login-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(10, 35, 20, 0.55), rgba(10, 35, 20, 0.55)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 2000;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: rgba(255, 253, 247, 0.96);
      border-radius: 16px;
      border: 1px solid #e0d5c2;
      padding: 24px 26px 20px 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      text-align: center;
      backdrop-filter: blur(6px);
    }
    .login-logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 18px;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .login-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 18px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }
    .login-input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e0d5c2;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      background: #fffdf7;
      text-align: left;
    }
    .login-input:focus {
      border-color: #111;
      background: #ffffff;
    }
    .login-btn {
      margin-top: 4px;
      width: 100%;
      border-radius: 8px;
      border: none;
      padding: 8px 10px;
      font-size: 14px;
      font-weight: 600;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
    .login-btn:hover {
      background: #000;
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    }
    .login-error {
      min-height: 16px;
      font-size: 12px;
      color: #b91c1c;
      margin-bottom: 4px;
    }
    .login-footer-text {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }
    .login-footer-text b {
      font-weight: 600;
      color: #6b7280;
    }

    /* APP LAYOUT */
    .app {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100vh;
      min-width: 0;
    }
    .topbar {
      height: 56px;
      background: #fffdf7;
      border-bottom: 1px solid #e0d5c2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search {
      width: 220px;
      max-width: 50vw;
      height: 32px;
      border-radius: 999px;
      border: 1px solid #e0d5c2;
      padding: 0 10px;
      font-size: 13px;
      outline: none;
      background: #fffdf7;
    }
    .search:focus {
      border-color: #111;
      background: #ffffff;
    }

    .main-row {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
      min-width: 0;
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 16px 16px;
      min-width: 0;
    }
    .right-nav {
      width: 90px;
      background: #fffdf7;
      border-left: 1px solid #e0d5c2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 14px;
      flex-shrink: 0;
    }
    .nav-logo-box {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      overflow: hidden;
      background: #ddd;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .nav-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .nav-items {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      flex: 1;
      min-height: 0;
    }
    .nav-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .nav-item {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-item:hover {
      background-color: #f5f0e6;
      transform: translateY(-1px);
    }
    .nav-item.active {
      background-color: #f0e6d5;
      transform: translateY(-1px);
    }
    .nav-label {
      font-size: 10px;
      color: #555;
      text-align: center;
      margin-top: 2px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* FEED */
    .feed-column {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .feed-post {
      background: #fffdf7;
      border-radius: 12px;
      border: 1px solid #e0d5c2;
      overflow: hidden;
      position: relative;
    }
    .feed-header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #d0d0d0;
      object-fit: cover;
      flex-shrink: 0;
    }
    .feed-user {
      font-size: 13px;
      font-weight: 600;
    }
    .feed-meta {
      font-size: 11px;
      color: #8e8e8e;
    }
    .feed-image {
      width: 100%;
      position: relative;
      padding-top: 100%;
      background-position: center;
      background-size: cover;
    }
    .feed-actions-row {
      padding: 8px 12px 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .feed-caption-inline {
      font-size: 13px;
      line-height: 1.4;
      flex: 1;
    }
    .feed-caption-inline b { font-weight: 600; }
    .feed-time {
      padding: 4px 12px 10px 12px;
      font-size: 10px;
      text-transform: uppercase;
      color: #8e8e8e;
    }
    .hashtag {
      color: #00376b;
      cursor: pointer;
      font-size: 12px;
      margin-left: 4px;
    }
    .hashtag:hover { text-decoration: underline; }

    .new-post-form {
      max-width: 600px;
      margin: 0 auto 16px auto;
      background: #fffdf7;
      border-radius: 12px;
      border: 1px solid #e0d5c2;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .new-post-form input,
    .new-post-form textarea {
      border-radius: 8px;
      border: 1px solid #e0d5c2;
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
      background: #fffdf7;
    }
    .new-post-form textarea {
      resize: vertical;
      min-height: 60px;
    }
    .new-post-form button {
      align-self: flex-end;
      border-radius: 999px;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    /* CHATS */
    .chats-layout {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 12px;
      height: calc(100vh - 56px - 32px);
      min-height: 0;
    }
    .chat-list {
      background: #fffdf7;
      border-radius: 12px;
      border: 1px solid #e0d5c2;
      overflow-y: auto;
      padding: 8px 0;
      min-height: 0;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
    }
    .chat-item:hover { background: #f5ecdd; }
    .chat-item.active { background: #f0e6d5; }
    .chat-main { font-size: 14px; font-weight: 600; }
    .chat-sub {
      font-size: 12px;
      color: #8e8e8e;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-dialog {
      background: #fffdf7;
      border-radius: 12px;
      border: 1px solid #e0d5c2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .chat-dialog-header {
      padding: 10px 12px;
      border-bottom: 1px solid #e0d5c2;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
    }
    .chat-dialog-body {
      flex: 1;
      padding: 10px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 13px;
      min-height: 0;
    }
    .msg {
      max-width: 70%;
      padding: 6px 10px;
      border-radius: 16px;
      line-height: 1.4;
      position: relative;
    }
    .msg.me {
      margin-left: auto;
      background: #f0e6d5;
    }
    .msg.them {
      background: #f5ecdd;
    }
    .msg-time {
      font-size: 10px;
      color: #8e8e8e;
      margin-top: 2px;
    }
    .chat-dialog-input {
      border-top: 1px solid #e0d5c2;
      padding: 8px 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
    }
    .chat-dialog-input input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid #e0d5c2;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      min-width: 0;
      background: #fffdf7;
    }
    .chat-dialog-input button {
      border-radius: 999px;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      background: #111;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    /* PROFILE (упрощённо, но в твоём стиле) */
    .profile-header {
      max-width: 720px;
      margin: 0 auto 16px auto;
      background: #fffdf7;
      border-radius: 12px;
      border: 1px solid #e0d5c2;
      overflow: hidden;
      position: relative;
    }
    .profile-cover {
      height: 140px;
      background: radial-gradient(circle at top left, #3b4252, #111827);
      position: relative;
    }
    .profile-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #ffffff;
      position: absolute;
      left: 24px;
      bottom: -45px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      overflow: hidden;
      z-index: 2;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-info {
      padding: 56px 24px 16px 24px;
      position: relative;
      z-index: 1;
    }
    .profile-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .profile-name-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .profile-name { font-size: 18px; font-weight: 700; }
    .profile-username { font-size: 13px; color: #8e8e8e; }
    .profile-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn-primary {
      border-radius: 999px;
      border: none;
      background: #111;
      color: #fff;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .btn-ghost {
      border-radius: 999px;
      border: 1px solid #e0d5c2;
      background: #fffdf7;
      color: #111;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
    }
    .profile-bio {
      font-size: 13px;
      line-height: 1.4;
      margin-top: 8px;
    }

    .profile-grid {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .profile-grid-item {
      background: #d0d0d0;
      height: 160px;
      border-radius: 8px;
      background-position: center;
      background-size: cover;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px 18px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 13px;
    }
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .modal-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8e8e8e;
    }
    .modal-input,
    .modal-textarea {
      border-radius: 8px;
      border: 1px solid #e0d5c2;
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
      background: #fffdf7;
    }
    .modal-textarea {
      resize: vertical;
      min-height: 60px;
      max-height: 160px;
    }
    .modal-footer {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 720px) {
      body { overflow: auto; }
      .main-row { flex-direction: column-reverse; }
      .right-nav {
        width: 100%;
        height: 64px;
        border-left: none;
        border-top: 1px solid #e0d5c2;
        flex-direction: row;
        justify-content: space-around;
        padding: 6px 8px;
      }
      .nav-items {
        flex-direction: row;
        gap: 10px;
        margin-top: 0;
      }
      .nav-label { display: none; }
      .content { padding: 8px 8px 72px 8px; }
      .chats-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
    }
  </style>
</head>
<body class="theme-paper">

  <!-- LOGIN -->
  <div class="login-wrapper" id="loginWrapper">
    <div class="login-card">
      <div class="login-logo">RENITEA</div>
      <div class="login-subtitle">Войдите, чтобы продолжить.</div>
      <div class="login-form">
        <input type="text" class="login-input" id="loginUser" placeholder="Логин" autocomplete="off">
        <input type="password" class="login-input" id="loginPass" placeholder="Пароль" autocomplete="off">
        <button class="login-btn" id="loginBtn">Войти</button>
      </div>
      <div class="login-error" id="loginError"></div>
      <div class="login-footer-text">
        Это закрытый доступ. Если вы здесь случайно — просто закройте вкладку.
        <br>Проект: <b>Renitea</b>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="appRoot">
    <header class="topbar">
      <div class="brand">RENITEA</div>
      <div class="topbar-right">
        <input class="search" type="text" placeholder="Поиск пользователей" id="userSearch">
      </div>
    </header>

    <div class="main-row">
      <main class="content">
        <!-- ПОСТЫ -->
        <section class="screen active" id="screen-posts">
          <div class="new-post-form">
            <div>Новый пост</div>
            <input type="text" id="newPostImage" placeholder="URL картинки (опционально)">
            <textarea id="newPostText" placeholder="Текст поста"></textarea>
            <button id="newPostBtn">Опубликовать</button>
          </div>
          <div class="feed-column" id="feedColumn"></div>
        </section>

        <!-- ЧАТЫ -->
        <section class="screen" id="screen-chats">
          <div class="chats-layout">
            <div class="chat-list" id="chatList"></div>
            <div class="chat-dialog" id="chatDialog">
              <div class="chat-dialog-header">
                <div style="display:flex;align-items:center;gap:8px;">
                  <img class="avatar" id="chatDialogAvatar" src="" alt="">
                  <div class="chat-dialog-name" id="chatDialogName"></div>
                </div>
              </div>
              <div class="chat-dialog-body" id="chatDialogBody"></div>
              <div class="chat-dialog-input">
                <input type="text" placeholder="Написать сообщение..." id="chatInput">
                <button type="button" id="chatSendBtn">Отпр.</button>
              </div>
            </div>
          </div>
        </section>

        <!-- ПРОФИЛЬ -->
        <section class="screen" id="screen-profile">
          <div class="profile-header">
            <div class="profile-cover">
              <div class="profile-avatar">
                <img id="profileAvatarImg" src="" alt="">
              </div>
            </div>
            <div class="profile-info">
              <div class="profile-top-row">
                <div class="profile-name-block">
                  <div class="profile-name" id="profileName"></div>
                  <div class="profile-username" id="profileNick"></div>
                </div>
                <div class="profile-actions">
                  <button class="btn-primary" id="editProfileBtn">Редактировать</button>
                  <button class="btn-ghost" id="logoutBtn">Выйти</button>
                </div>
              </div>
              <div class="profile-bio" id="profileBio"></div>
            </div>
          </div>

          <div class="profile-grid" id="profileGrid"></div>
        </section>
      </main>

      <!-- НАВИГАЦИЯ -->
      <aside class="right-nav">
        <div class="nav-logo-box" id="navLogoBox">
          <img id="navLogoImg" src="https://picsum.photos/200/200?random=99" alt="logo">
          <input type="file" id="navLogoInput" accept="image/*" style="display:none">
        </div>

        <div class="nav-items">
          <div class="nav-block">
            <div class="nav-item active" data-screen="posts">
              <svg viewBox="0 0 24 24" width="26" height="26">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
              </svg>
            </div>
            <div class="nav-label">Посты</div>
          </div>

          <div class="nav-block">
            <div class="nav-item" data-screen="chats">
              <svg viewBox="0 0 24 24" width="26" height="26">
                <path d="M4 5c0-1.1.9-2 2-2h12c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H9l-4 4v-4H6c-1.1 0-2-.9-2-2V5z"/>
              </svg>
            </div>
            <div class="nav-label">Чаты</div>
          </div>

          <div class="nav-block">
            <div class="nav-item" data-screen="profile">
              <img id="navProfileAvatar" src="" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
            </div>
            <div class="nav-label">Профиль</div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- МОДАЛКА РЕДАКТИРОВАНИЯ ПРОФИЛЯ -->
  <div class="modal-backdrop" id="editProfileModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Редактировать профиль</div>
        <div class="modal-close" id="editProfileClose" style="cursor:pointer;">×</div>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <div class="modal-label">Имя</div>
          <input type="text" class="modal-input" id="editProfileNameInput">
        </div>
        <div class="modal-field">
          <div class="modal-label">Ник</div>
          <input type="text" class="modal-input" id="editProfileNickInput">
        </div>
        <div class="modal-field">
          <div class="modal-label">Био</div>
          <textarea class="modal-textarea" id="editProfileBioInput"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="editProfileCancel">Отмена</button>
        <button class="btn-primary" id="editProfileSave">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    /* ====== ДАННЫЕ ПОЛЬЗОВАТЕЛЕЙ ====== */
    const DEFAULT_USERS = [
      {
        id: 'david',
        login: 'david.tea',
        password: 'DaV1d_Tea!24',
        name: 'Давид',
        nick: '@david',
        avatar: 'https://randomuser.me/api/portraits/men/45.jpg',
        bio: 'Собираю моменты, пока они ещё тёплые.',
      },
      {
        id: 'polina',
        login: 'polina.sky',
        password: 'Pol1na_Sky@27',
        name: 'Полина',
        nick: '@polina',
        avatar: 'https://randomuser.me/api/portraits/women/12.jpg',
        bio: 'Фотографии, чай и немного тишины.',
      },
      {
        id: 'vanya',
        login: 'vanya.frame',
        password: 'Vanya_Fr4me#19',
        name: 'Ваня',
        nick: '@vanya',
        avatar: 'https://randomuser.me/api/portraits/men/22.jpg',
        bio: 'Люблю улицы, которые не спешат.',
      },
      {
        id: 'sofia',
        login: 'sofia.day',
        password: 'S0fia_Day%21',
        name: 'София',
        nick: '@sofia',
        avatar: 'https://randomuser.me/api/portraits/women/33.jpg',
        bio: 'Сохраняю обычные дни, чтобы они не терялись.',
      },
      {
        id: 'arsekov',
        login: 'arsekov.mood',
        password: 'Arsek0v_Mood&26',
        name: 'Арсеков',
        nick: '@arsekov',
        avatar: 'https://randomuser.me/api/portraits/men/31.jpg',
        bio: 'Город, музыка и немного хаоса.',
      },
    ];

    const LS_KEY = 'renitea_state_v1';

    function loadState() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    // Инициализация состояния
    let state = loadState();
    if (!state) {
      state = {
        users: DEFAULT_USERS,
        posts: [], // {id, authorId, text, image, createdAt}
        messages: {}, // key: chatId (userA|userB sorted), value: [{fromId,toId,text,time}]
        currentUserId: null,
      };
      saveState();
    }

    function getUserById(id) {
      return state.users.find(u => u.id === id);
    }
    function getUserByLogin(login) {
      return state.users.find(u => u.login === login);
    }

    /* ====== ЭЛЕМЕНТЫ ====== */
    const loginWrapper = document.getElementById('loginWrapper');
    const appRoot = document.getElementById('appRoot');
    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    const screens = {
      posts: document.getElementById('screen-posts'),
      chats: document.getElementById('screen-chats'),
      profile: document.getElementById('screen-profile'),
    };
    const navItems = document.querySelectorAll('.nav-item');

    const userSearch = document.getElementById('userSearch');

    const feedColumn = document.getElementById('feedColumn');
    const newPostImage = document.getElementById('newPostImage');
    const newPostText = document.getElementById('newPostText');
    const newPostBtn = document.getElementById('newPostBtn');

    const chatList = document.getElementById('chatList');
    const chatDialogAvatar = document.getElementById('chatDialogAvatar');
    const chatDialogName = document.getElementById('chatDialogName');
    const chatDialogBody = document.getElementById('chatDialogBody');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');

    const profileName = document.getElementById('profileName');
    const profileNick = document.getElementById('profileNick');
    const profileAvatarImg = document.getElementById('profileAvatarImg');
    const profileBio = document.getElementById('profileBio');
    const profileGrid = document.getElementById('profileGrid');
    const navProfileAvatar = document.getElementById('navProfileAvatar');

    const editProfileBtn = document.getElementById('editProfileBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const editProfileModal = document.getElementById('editProfileModal');
    const editProfileClose = document.getElementById('editProfileClose');
    const editProfileCancel = document.getElementById('editProfileCancel');
    const editProfileSave = document.getElementById('editProfileSave');
    const editProfileNameInput = document.getElementById('editProfileNameInput');
    const editProfileNickInput = document.getElementById('editProfileNickInput');
    const editProfileBioInput = document.getElementById('editProfileBioInput');

    /* ====== ВСПОМОГАТЕЛЬНОЕ ====== */
    function showScreen(name) {
      Object.keys(screens).forEach(key => {
        screens[key].classList.toggle('active', key === name);
      });
    }

    navItems.forEach(item => {
      item.addEventListener('click', () => {
        navItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const target = item.dataset.screen;
        if (target) showScreen(target);
      });
    });

    function formatTime(date) {
      const d = new Date(date);
      return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function chatKey(a, b) {
      return [a, b].sort().join('|');
    }

    /* ====== РЕНДЕР ПОСТОВ ====== */
    function renderPosts() {
      feedColumn.innerHTML = '';
      const currentUser = getUserById(state.currentUserId);
      const posts = state.posts
        .slice()
        .sort((a, b) => b.createdAt - a.createdAt);

      posts.forEach(post => {
        const author = getUserById(post.authorId) || currentUser;
        const article = document.createElement('article');
        article.className = 'feed-post';
        article.innerHTML = `
          <div class="feed-header">
            <img class="avatar" src="${author.avatar}" alt="">
            <div>
              <div class="feed-user">${author.nick}</div>
              <div class="feed-meta">${author.name}</div>
            </div>
          </div>
          <div class="feed-image" style="${post.image ? `background-image:url('${post.image}');` : 'background:#d0d0d0;'}"></div>
          <div class="feed-actions-row">
            <div class="feed-caption-inline">
              <b>${author.nick}</b> ${post.text}
            </div>
          </div>
          <div class="feed-time">${formatTime(post.createdAt)}</div>
        `;
        feedColumn.appendChild(article);
      });
    }

    newPostBtn.addEventListener('click', () => {
      const text = newPostText.value.trim();
      const image = newPostImage.value.trim();
      if (!text && !image) return;
      state.posts.push({
        id: 'post_' + Date.now(),
        authorId: state.currentUserId,
        text,
        image: image || '',
        createdAt: Date.now(),
      });
      saveState();
      newPostText.value = '';
      newPostImage.value = '';
      renderPosts();
      renderProfileGrid();
    });

    /* ====== РЕНДЕР ПРОФИЛЯ ====== */
    function renderProfile() {
      const user = getUserById(state.currentUserId);
      if (!user) return;
      profileName.textContent = user.name;
      profileNick.textContent = user.nick;
      profileAvatarImg.src = user.avatar;
      navProfileAvatar.src = user.avatar;
      profileBio.textContent = user.bio || '';
    }

    function renderProfileGrid() {
      const user = getUserById(state.currentUserId);
      if (!user) return;
      profileGrid.innerHTML = '';
      const userPosts = state.posts.filter(p => p.authorId === user.id);
      userPosts.forEach(p => {
        const div = document.createElement('div');
        div.className = 'profile-grid-item';
        if (p.image) {
          div.style.backgroundImage = `url('${p.image}')`;
        }
        profileGrid.appendChild(div);
      });
    }

    /* ====== РЕДАКТИРОВАНИЕ ПРОФИЛЯ ====== */
    function openEditProfileModal() {
      const user = getUserById(state.currentUserId);
      if (!user) return;
      editProfileNameInput.value = user.name;
      editProfileNickInput.value = user.nick;
      editProfileBioInput.value = user.bio || '';
      editProfileModal.classList.add('active');
    }
    function closeEditProfileModal() {
      editProfileModal.classList.remove('active');
    }

    editProfileBtn.addEventListener('click', openEditProfileModal);
    editProfileClose.addEventListener('click', closeEditProfileModal);
    editProfileCancel.addEventListener('click', closeEditProfileModal);

    editProfileSave.addEventListener('click', () => {
      const user = getUserById(state.currentUserId);
      if (!user) return;
      user.name = editProfileNameInput.value.trim() || user.name;
      user.nick = editProfileNickInput.value.trim() || user.nick;
      user.bio = editProfileBioInput.value.trim();
      saveState();
      renderProfile();
      closeEditProfileModal();
    });

    editProfileModal.addEventListener('click', (e) => {
      if (e.target === editProfileModal) closeEditProfileModal();
    });

    /* ====== ЧАТЫ ====== */
    let currentChatUserId = null;

    function renderChatList(filter = '') {
      const currentUser = getUserById(state.currentUserId);
      chatList.innerHTML = '';
      const q = filter.toLowerCase().trim();

      state.users
        .filter(u => u.id !== currentUser.id)
        .filter(u => {
          if (!q) return true;
          return (
            u.name.toLowerCase().includes(q) ||
            u.nick.toLowerCase().includes(q) ||
            u.login.toLowerCase().includes(q)
          );
        })
        .forEach(u => {
          const key = chatKey(currentUser.id, u.id);
          const msgs = state.messages[key] || [];
          const last = msgs[msgs.length - 1];
          const item = document.createElement('div');
          item.className = 'chat-item' + (u.id === currentChatUserId ? ' active' : '');
          item.dataset.chatId = u.id;
          item.innerHTML = `
            <img class="avatar" src="${u.avatar}" alt="">
            <div>
              <div class="chat-main">${u.name}</div>
              <div class="chat-sub">${last ? last.text : 'Нет сообщений'}</div>
            </div>
          `;
          item.addEventListener('click', () => {
            currentChatUserId = u.id;
            renderChatList(userSearch.value);
            renderChatDialog();
          });
          chatList.appendChild(item);
        });
    }

    function renderChatDialog() {
      const currentUser = getUserById(state.currentUserId);
      const other = getUserById(currentChatUserId);
      if (!other) {
        chatDialogAvatar.src = '';
        chatDialogName.textContent = '';
        chatDialogBody.innerHTML = '';
        return;
      }
      chatDialogAvatar.src = other.avatar;
      chatDialogName.textContent = other.name;

      const key = chatKey(currentUser.id, other.id);
      const msgs = state.messages[key] || [];
      chatDialogBody.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.fromId === currentUser.id ? 'me' : 'them');
        div.innerHTML = `
          <div>${m.text}</div>
          <div class="msg-time">${m.time}</div>
        `;
        chatDialogBody.appendChild(div);
      });
      chatDialogBody.scrollTop = chatDialogBody.scrollHeight;
    }

    chatSendBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (!text || !currentChatUserId) return;
      const currentUser = getUserById(state.currentUserId);
      const other = getUserById(currentChatUserId);
      const key = chatKey(currentUser.id, other.id);
      if (!state.messages[key]) state.messages[key] = [];
      state.messages[key].push({
        fromId: currentUser.id,
        toId: other.id,
        text,
        time: formatTime(Date.now()),
      });
      chatInput.value = '';
      saveState();
      renderChatList(userSearch.value);
      renderChatDialog();
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        chatSendBtn.click();
      }
    });

    /* ====== ПОИСК ПОЛЬЗОВАТЕЛЕЙ (влияет на список чатов) ====== */
    userSearch.addEventListener('input', () => {
      renderChatList(userSearch.value);
    });

    /* ====== ЛОГИН / ЛОГАУТ ====== */
    function tryLogin() {
      const login = (loginUser.value || '').trim();
      const pass = loginPass.value || '';
      const user = getUserByLogin(login);
      if (!user || user.password !== pass) {
        loginError.textContent = 'Неверный логин или пароль.';
        return;
      }
      state.currentUserId = user.id;
      saveState();
      loginError.textContent = '';
      loginWrapper.style.display = 'none';
      appRoot.style.display = 'flex';
      afterLogin();
    }

    loginBtn.addEventListener('click', tryLogin);
    loginPass.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        tryLogin();
      }
    });
    loginUser.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loginPass.focus();
      }
    });

    logoutBtn.addEventListener('click', () => {
      state.currentUserId = null;
      saveState();
      appRoot.style.display = 'none';
      loginWrapper.style.display = 'flex';
      loginUser.value = '';
      loginPass.value = '';
    });

    /* ====== ПОСЛЕ ЛОГИНА ====== */
    function afterLogin() {
      renderProfile();
      renderProfileGrid();
      renderPosts();
      currentChatUserId = null;
      renderChatList(userSearch.value);
      renderChatDialog();
      showScreen('posts');
      navItems.forEach(i => i.classList.remove('active'));
      document.querySelector('.nav-item[data-screen="posts"]').classList.add('active');
    }

    // Автовход, если уже есть currentUserId
    if (state.currentUserId) {
      loginWrapper.style.display = 'none';
      appRoot.style.display = 'flex';
      afterLogin();
    }
  </script>
</body>
