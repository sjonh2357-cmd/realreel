<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RENITEA · создай свой момент</title>
  <style>
    /* ========== ЧАСТЬ 1: ГЛОБАЛЬНЫЕ СТИЛИ И ГАЗЕТНЫЙ ФОН ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Times New Roman', serif;
    }

    body {
      min-height: 100vh;
      background: #e8e0d5;
      overflow-x: hidden;
    }

    /* ГАЗЕТНЫЙ ФОН (текстура старой бумаги) */
    .login-wrapper {
      position: fixed;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/aged-paper.png'), linear-gradient(145deg, #dcd0b0 0%, #c8b991 100%);
      background-blend-mode: overlay;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .login-card {
      max-width: 440px;
      width: 90%;
      background: rgba(255, 252, 240, 0.97);
      border-radius: 32px;
      border: 1px solid #c4b28a;
      padding: 36px 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
      backdrop-filter: blur(2px);
    }

    .login-logo {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 5px;
      text-align: center;
      background: linear-gradient(135deg, #3a2c1f, #8b5a2b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login-subtitle {
      text-align: center;
      color: #5a4b3a;
      font-size: 15px;
      margin: 10px 0 24px;
      font-style: italic;
    }

    .login-tabs {
      display: flex;
      gap: 12px;
      background: #e5d8c4;
      border-radius: 60px;
      padding: 5px;
      margin-bottom: 28px;
    }

    .login-tab {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-tab.active {
      background: #2c241e;
      color: #fff5e6;
    }

    .login-input {
      width: 100%;
      border: 1.5px solid #d6c8b2;
      border-radius: 20px;
      padding: 14px 18px;
      background: #fffef8;
      margin-bottom: 16px;
      font-size: 15px;
    }

    .login-input:focus {
      border-color: #8b5a2b;
      outline: none;
    }

    .login-file {
      font-size: 14px;
      margin: 8px 0 16px;
      color: #5a4b3a;
    }

    .login-btn {
      background: #2c241e;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px;
      width: 100%;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-btn:hover {
      background: #8b5a2b;
    }

    .login-error {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
    }

    /* ========== ОСНОВНОЙ ИНТЕРФЕЙС ========== */
    .app {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      background: #e8e0d5;
    }

    .topbar {
      background: #fffef8;
      border-bottom: 1px solid #d6c8b2;
      padding: 0 28px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #3a2c1f, #8b5a2b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search {
      width: 280px;
      border-radius: 60px;
      border: 1px solid #d6c8b2;
      padding: 10px 22px;
      background: #fffef8;
      font-size: 14px;
    }

    .main-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
    }

    /* ========== ЛЕНТА ПОСТОВ ========== */
    .feed-composer {
      max-width: 700px;
      margin: 0 auto 30px;
      background: #fffef8;
      border: 1px solid #d6c8b2;
      border-radius: 28px;
      padding: 24px;
    }

    .feed-composer textarea {
      width: 100%;
      border: 1px solid #d6c8b2;
      border-radius: 20px;
      padding: 16px;
      font-size: 15px;
      resize: vertical;
      background: #fffef8;
    }

    .feed-composer input[type="file"] {
      margin: 14px 0 12px;
    }

    .feed-composer button {
      background: #2c241e;
      color: white;
      border-radius: 40px;
      padding: 10px 28px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .feed-list {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .feed-post {
      background: #fffef8;
      border: 1px solid #d6c8b2;
      border-radius: 28px;
      overflow: hidden;
    }

    .post-header {
      padding: 18px 24px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-author {
      font-weight: 800;
      font-size: 17px;
    }

    .post-date {
      font-size: 12px;
      color: #8e7a5f;
    }

    .feed-post-image {
      width: 100%;
      max-height: 580px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1612;
      cursor: zoom-in;
    }

    .feed-post-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.25s;
    }

    .feed-post-image.zoomed {
      cursor: zoom-out;
    }

    .feed-post-image.zoomed img {
      transform: scale(2.2);
    }

    .feed-post-text {
      padding: 18px 24px;
      font-size: 16px;
      line-height: 1.5;
      color: #2c241e;
      border-bottom: 1px solid #f0e8dc;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 14px 24px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: 0.1s;
      color: #5a4b3a;
    }

    .action-btn:hover {
      transform: scale(1.08);
      color: #8b5a2b;
    }

    .action-count {
      font-size: 14px;
      font-weight: 600;
    }

    /* ========== СТИКИ ========== */
    .stiki-composer {
      max-width: 620px;
      margin: 0 auto 24px;
      background: #fffef8;
      border-radius: 28px;
      padding: 22px;
      border: 1px solid #d6c8b2;
    }

    .stiki-wrapper {
      max-width: 620px;
      margin: 0 auto;
      height: 72vh;
      scroll-snap-type: y mandatory;
      overflow-y: auto;
      border-radius: 32px;
    }

    .stiki-card {
      position: relative;
      height: 72vh;
      margin-bottom: 20px;
      border-radius: 32px;
      overflow: hidden;
      scroll-snap-align: start;
      background: #000;
    }

    .stiki-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stiki-reactions {
      position: absolute;
      bottom: 24px;
      left: 20px;
      display: flex;
      gap: 24px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      padding: 10px 22px;
      border-radius: 60px;
    }

    .stiki-reaction {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: white;
      font-size: 24px;
    }

    /* ========== ЧАТЫ ========== */
    .chats-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      background: #fffef8;
      border-radius: 32px;
      border: 1px solid #d6c8b2;
      overflow: hidden;
      height: 76vh;
    }

    .chat-list {
      background: #faf5ec;
      border-right: 1px solid #d6c8b2;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
      border-bottom: 1px solid #e8dfd1;
      transition: 0.1s;
    }

    .chat-item.active {
      background: #e8dfd1;
    }

    .chat-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #d6c8b2;
      overflow: hidden;
      flex-shrink: 0;
    }

    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-dialog {
      display: flex;
      flex-direction: column;
    }

    .chat-dialog-header {
      padding: 18px 22px;
      border-bottom: 1px solid #d6c8b2;
      background: #faf5ec;
    }

    .chat-dialog-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 72%;
      padding: 12px 18px;
      border-radius: 24px;
      font-size: 14px;
    }

    .msg.me {
      background: #e3d9ca;
      margin-left: auto;
    }

    .msg.them {
      background: white;
      border: 1px solid #d6c8b2;
      margin-right: auto;
    }

    .chat-dialog-input {
      display: flex;
      gap: 14px;
      padding: 18px;
      border-top: 1px solid #d6c8b2;
      background: #faf5ec;
    }

    .chat-dialog-input input {
      flex: 1;
      border-radius: 60px;
      border: 1px solid #d6c8b2;
      padding: 12px 20px;
      background: #fffef8;
    }

    /* ========== ПАСПОРТ ========== */
    .passport-layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 28px;
    }

    .passport-card {
      background: #fffef8;
      border: 1px solid #d6c8b2;
      border-radius: 32px;
      padding: 30px;
    }

    .passport-photo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background: #d6c8b2;
      background-size: cover;
      background-position: center;
    }

    .visa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px;
    }

    .visa-card {
      background: #fffef8;
      border: 1px solid #d6c8b2;
      border-radius: 24px;
      padding: 20px;
    }

    /* ========== ПРОФИЛЬ ========== */
    .profile-header {
      max-width: 800px;
      margin: 0 auto 32px;
      background: #fffef8;
      border: 1px solid #d6c8b2;
      border-radius: 36px;
      overflow: hidden;
    }

    .profile-cover {
      height: 160px;
      background: linear-gradient(145deg, #c8b991, #a68f6e);
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid white;
      margin-top: -60px;
      margin-left: 34px;
      background: white;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      padding: 20px 34px 34px;
    }

    .profile-stats {
      display: flex;
      gap: 34px;
      margin: 18px 0;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 800px;
      margin: 0 auto;
    }

    .profile-grid-item {
      aspect-ratio: 1/1;
      background: #d6c8b2;
      border-radius: 20px;
      overflow: hidden;
    }

    .profile-grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ========== НАВИГАЦИЯ ========== */
    .right-nav {
      width: 100px;
      background: #fffef8;
      border-left: 1px solid #d6c8b2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
      gap: 30px;
    }

    .nav-item {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s;
    }

    .nav-item.active {
      background: #e8dfd1;
    }

    .nav-item svg {
      width: 30px;
      height: 30px;
      stroke: #2c241e;
      stroke-width: 1.8;
      fill: none;
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 254, 248, 0.98);
      backdrop-filter: blur(12px);
      border-top: 1px solid #d6c8b2;
      justify-content: space-around;
      padding: 10px 0 24px;
      z-index: 500;
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    /* ========== МОДАЛЬНЫЕ ОКНА ========== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1300;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      background: #fffef8;
      border-radius: 36px;
      max-width: 500px;
      width: 90%;
      padding: 32px;
      border: 1px solid #d6c8b2;
    }

    .modal input, .modal textarea {
      width: 100%;
      margin-bottom: 18px;
      border-radius: 20px;
      border: 1px solid #d6c8b2;
      padding: 14px 18px;
    }

    @media (max-width: 720px) {
      .right-nav { display: none; }
      .mobile-nav { display: flex; }
      .chats-layout { grid-template-columns: 1fr; height: auto; }
      .passport-layout { grid-template-columns: 1fr; }
      .content { padding-bottom: 100px; }
      .post-actions { gap: 20px; }
    }
  </style>
</head>
<body>

<!-- ЛОГИН И РЕГИСТРАЦИЯ -->
<div class="login-wrapper" id="loginWrapper">
  <div class="login-card">
    <div class="login-logo">RENITEA</div>
    <div class="login-subtitle">создай свой момент</div>
    <div class="login-tabs">
      <button class="login-tab active" data-tab="login">Войти</button>
      <button class="login-tab" data-tab="register">Создать</button>
    </div>
    <div id="loginForm">
      <input type="email" id="loginEmail" class="login-input" placeholder="Email">
      <input type="password" id="loginPass" class="login-input" placeholder="Пароль">
      <button class="login-btn" id="loginBtn">Войти</button>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regName" class="login-input" placeholder="Имя">
      <input type="text" id="regNick" class="login-input" placeholder="Никнейм">
      <input type="email" id="regEmail" class="login-input" placeholder="Email">
      <input type="password" id="regPass" class="login-input" placeholder="Пароль">
      <input type="password" id="regPass2" class="login-input" placeholder="Повтор пароля">
      <div class="login-file">Аватар: <input type="file" id="regAvatar" accept="image/*"></div>
      <button class="login-btn" id="registerBtn">Создать аккаунт</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div class="app" id="appRoot">
  <header class="topbar"><div class="brand">RENITEA</div><input class="search" id="userSearch" placeholder="Поиск людей..."></header>
  <div class="main-row">
    <main class="content">
      <section class="screen active" id="screen-posts">
        <div class="feed-composer"><textarea id="feedText" placeholder="Что у тебя нового?"></textarea><input type="file" id="feedImage" accept="image/*"><button id="feedPublishBtn">Опубликовать</button></div>
        <div class="feed-list" id="feedList"></div>
        <div id="feedEmptyText" style="display:none; text-align:center; padding:40px;">✨ Лента пуста, создай первый момент</div>
        <div style="margin-top:36px;"><div style="font-weight:700; margin-bottom:14px;">📌 Рекомендации</div><div id="recommendationsList"></div></div>
      </section>
      <section class="screen" id="screen-stiki"><div class="stiki-composer"><input type="file" id="stikiInput" accept="video/*"><button id="stikiPublishBtn">🎬 Опубликовать стик</button></div><div id="stikiWrapper" class="stiki-wrapper"></div></section>
      <section class="screen" id="screen-chats"><div class="chats-layout"><div class="chat-list" id="chatList"></div><div class="chat-dialog"><div class="chat-dialog-header" id="chatHeaderProfile"><div class="chat-avatar" id="chatDialogAvatar"></div><div><div id="chatDialogName"></div><div id="chatDialogNick"></div></div></div><div class="chat-dialog-body" id="chatDialogBody"></div><div class="chat-dialog-input"><input id="chatInput" placeholder="Сообщение..."><button id="chatSendBtn">→</button></div></div></div></section>
      <section class="screen" id="screen-passport"><div class="passport-layout"><div class="passport-card"><div style="display:flex; justify-content:space-between;"><div><h3>Паспорт RENITEA</h3><div id="passportName">—</div><div id="passportNick">—</div></div><div class="passport-photo" id="passportPhoto"></div></div><div>Характер: <span id="passportPersona">—</span></div><div>Моментов: <span id="passportMomentsCount">0</span></div></div><div class="visa-grid" id="visaGrid"></div></div></section>
      <section class="screen" id="screen-profile"><div class="profile-header"><div class="profile-cover"></div><div class="profile-avatar"><img id="profileAvatarImg"></div><div class="profile-info"><div><div class="post-author" id="profileName"></div><div id="profileNick"></div><div id="profileBio"></div></div><div class="profile-stats"><span><b id="profilePostsCount">0</b> постов</span><span><b id="profileFollowersCount">0</b> подписчиков</span><span><b id="profileFollowingCount">0</b> подписки</span></div><div><button id="editProfileBtn" class="login-btn" style="width:auto; padding:8px 24px;">Редактировать</button><button id="profileMessageBtn" class="login-btn" style="width:auto; padding:8px 24px; margin-left:12px;">Написать</button><button id="logoutBtn" class="login-btn" style="width:auto; padding:8px 24px; background:#8b5a2b;">Выйти</button></div></div></div><div class="profile-grid" id="profileGrid"></div></section>
    </main>
    <aside class="right-nav">
      <div class="nav-item active" data-screen="posts"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><rect x="6" y="6" width="12" height="8" rx="2"/></svg></div>
      <div class="nav-item" data-screen="stiki"><svg viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="3"/><rect x="9" y="5" width="6" height="10" rx="2"/></svg></div>
      <div class="nav-item" data-screen="chats"><svg viewBox="0 0 24 24"><path d="M5 5h14v10H7l-2 2z"/></svg></div>
      <div class="nav-item" data-screen="passport"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div class="nav-item" data-screen="profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3"/><path d="M6 19c1.5-3 4-4 6-4s4.5 1 6 4"/></svg></div>
    </aside>
  </div>
  <div class="mobile-nav">
    <div class="mobile-nav-item active" data-screen="posts">📰<span>Посты</span></div>
    <div class="mobile-nav-item" data-screen="stiki">🎬<span>Стики</span></div>
    <div class="mobile-nav-item" data-screen="chats">💬<span>Чаты</span></div>
    <div class="mobile-nav-item" data-screen="passport">🪪<span>Паспорт</span></div>
    <div class="mobile-nav-item" data-screen="profile">👤<span>Профиль</span></div>
  </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ ПРОФИЛЯ -->
<div class="modal-backdrop" id="editProfileModal"><div class="modal"><h3 style="margin-bottom:18px;">Редактировать профиль</h3><input id="editProfileNameInput" placeholder="Имя"><input id="editProfileNickInput" placeholder="Ник"><input id="editProfilePersonaInput" placeholder="Характер"><textarea id="editProfileBioInput" placeholder="Био" rows="3"></textarea><input type="file" id="editProfileAvatarInput" accept="image/*"><div style="display:flex; gap:12px; margin-top:16px;"><button id="editProfileSave" class="login-btn" style="width:auto;">Сохранить</button><button id="editProfileCancel" class="login-btn" style="width:auto; background:#8b5a2b;">Отмена</button></div></div></div>

    appId: "1:806278733594:web:d9887a35732173429f96a3"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // Компрессия изображений
  async function compressImage(file, maxWidth = 1080, quality = 0.8) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function imageToBase64(blob) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  }

  function formatTime(ts) {
    const d = ts?.toDate?.() || new Date(ts);
    return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

  function chatKey(a, b) {
    return [a, b].sort().join('__');
  }

  // Глобальное состояние
  let currentUser = null;
  let usersCache = {};
  let posts = [];
  let stiki = [];
  let messages = {};
  let postReactions = {};
  let stikiReactions = {};
  let currentChatUserId = null;
  let viewProfileUserId = null;
  let unsubPosts, unsubStiki, unsubUsers, unsubMessages;

  // ========== ЧАСТЬ 3: ФУНКЦИИ ОТОБРАЖЕНИЯ (RENDER) ==========
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('screen-' + name);
    if (target) target.classList.add('active');
    document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(i => {
      i.classList.remove('active');
      if (i.dataset.screen === name) i.classList.add('active');
    });
  }

  async function ensureUserDoc(user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        email: user.email,
        name: user.email.split('@')[0],
        nick: '@' + user.email.split('@')[0],
        persona: '',
        bio: '',
        avatarBase64: '',
        followers: 0,
        following: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }

  function listenUsers() {
    if (unsubUsers) unsubUsers();
    unsubUsers = db.collection('users').onSnapshot(snap => {
      snap.docs.forEach(doc => {
        usersCache[doc.id] = { id: doc.id, ...doc.data() };
      });
      renderProfile();
      renderPassport();
      renderChatList();
      renderRecommendations();
    });
  }

  function listenPosts() {
    if (unsubPosts) unsubPosts();
    unsubPosts = db.collection('posts').orderBy('createdAt', 'desc').onSnapshot(snap => {
      posts = snap.docs.map(doc => {
        const data = doc.data();
        return {
          id: doc.id,
          authorId: data.authorId,
          text: data.text || '',
          imageBase64: data.imageBase64 || '',
          createdAt: data.createdAt,
          time: data.createdAt ? formatTime(data.createdAt) : ''
        };
      });
      renderFeed();
      renderProfileGrid();
      renderPassport();
    });
  }

  function listenStiki() {
    if (unsubStiki) unsubStiki();
    unsubStiki = db.collection('stiki').orderBy('createdAt', 'desc').onSnapshot(snap => {
      stiki = snap.docs.map(doc => {
        const data = doc.data();
        return { id: doc.id, authorId: data.authorId, videoURL: data.videoURL };
      });
      renderStiki();
    });
  }

  function listenMessagesForChat(uid, other) {
    const key = chatKey(uid, other);
    if (unsubMessages) unsubMessages();
    unsubMessages = db.collection('chats').doc(key).collection('messages').orderBy('createdAt', 'asc').onSnapshot(snap => {
      messages[key] = snap.docs.map(doc => {
        const data = doc.data();
        return {
          fromId: data.fromId,
          text: data.text,
          time: data.createdAt ? formatTime(data.createdAt) : ''
        };
      });
      renderChatList();
      renderChatDialog();
    });
  }

  function renderFeed() {
    const container = document.getElementById('feedList');
    container.innerHTML = '';
    if (posts.length === 0) {
      document.getElementById('feedEmptyText').style.display = 'block';
      return;
    }
    document.getElementById('feedEmptyText').style.display = 'none';
    posts.forEach(post => {
      const reactions = postReactions[post.id] || { fire: 0 };
      const author = usersCache[post.authorId] || { name: 'Житель' };
      const postDiv = document.createElement('div');
      postDiv.className = 'feed-post';
      postDiv.innerHTML = `
        <div class="post-header"><span class="post-author">${author.name}</span><span class="post-date">${post.time}</span></div>
        <div class="feed-post-image"><img src="${post.imageBase64 || ''}" alt=""></div>
        <div class="feed-post-text">${post.text || ''}</div>
        <div class="post-actions">
          <button class="action-btn fire-btn" data-id="${post.id}">🔥</button>
          <span class="action-count">${reactions.fire}</span>
          <button class="action-btn">💬</button><span class="action-count">0</span>
          <button class="action-btn">✉️</button><span class="action-count"></span>
        </div>
      `;
      container.appendChild(postDiv);
      const imgContainer = postDiv.querySelector('.feed-post-image');
      imgContainer.addEventListener('click', () => imgContainer.classList.toggle('zoomed'));
      const fireBtn = postDiv.querySelector('.fire-btn');
      fireBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!postReactions[post.id]) postReactions[post.id] = { fire: 0 };
        postReactions[post.id].fire += 1;
        renderFeed();
      });
    });
  }

  function renderStiki() {
    const wrapper = document.getElementById('stikiWrapper');
    if (!wrapper) return;
    wrapper.innerHTML = '';
    if (stiki.length === 0) {
      wrapper.innerHTML = '<div style="padding:24px; text-align:center;">🎬 Нет стиков, добавь первый</div>';
      return;
    }
    stiki.forEach(stik => {
      const reacts = stikiReactions[stik.id] || { '🔥': 0, '❤️': 0 };
      const card = document.createElement('div');
      card.className = 'stiki-card';
      card.innerHTML = `
        <div class="stiki-video"><video src="${stik.videoURL}" autoplay muted loop playsinline></video></div>
        <div class="stiki-reactions">
          <div class="stiki-reaction" data-id="${stik.id}" data-emoji="🔥">🔥 <span>${reacts['🔥']}</span></div>
          <div class="stiki-reaction" data-id="${stik.id}" data-emoji="❤️">❤️ <span>${reacts['❤️']}</span></div>
        </div>
      `;
      wrapper.appendChild(card);
    });
    wrapper.querySelectorAll('.stiki-reaction').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.id;
        const emoji = el.dataset.emoji;
        if (!stikiReactions[id]) stikiReactions[id] = { '🔥': 0, '❤️': 0 };
        stikiReactions[id][emoji] += 1;
        renderStiki();
      });
    });
  }

  function renderProfile() {
    if (!currentUser) return;
    const uid = viewProfileUserId || currentUser.uid;
    const user = usersCache[uid];
    if (!user) return;
    document.getElementById('profileName').innerText = user.name || '';
    document.getElementById('profileNick').innerText = user.nick || '';
    document.getElementById('profileBio').innerText = user.bio || '';
    const avatarImg = document.getElementById('profileAvatarImg');
    if (avatarImg) avatarImg.src = user.avatarBase64 || '';
    const userPosts = posts.filter(p => p.authorId === uid);
    document.getElementById('profilePostsCount').innerText = userPosts.length;
    document.getElementById('profileFollowersCount').innerText = user.followers || 0;
    document.getElementById('profileFollowingCount').innerText = user.following || 0;
    const editBtn = document.getElementById('editProfileBtn');
    const msgBtn = document.getElementById('profileMessageBtn');
    if (uid === currentUser.uid) {
      editBtn.style.display = 'inline-block';
      msgBtn.style.display = 'none';
    } else {
      editBtn.style.display = 'none';
      msgBtn.style.display = 'inline-block';
    }
  }

  function renderProfileGrid() {
    const uid = viewProfileUserId || currentUser?.uid;
    const grid = document.getElementById('profileGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const userPosts = posts.filter(p => p.authorId === uid);
    userPosts.forEach(post => {
      const item = document.createElement('div');
      item.className = 'profile-grid-item';
      if (post.imageBase64) item.innerHTML = `<img src="${post.imageBase64}" alt="">`;
      grid.appendChild(item);
    });
  }

  function renderPassport() {
    if (!currentUser) return;
    const user = usersCache[currentUser.uid];
    if (!user) return;
    document.getElementById('passportName').innerText = user.name || '—';
    document.getElementById('passportNick').innerText = user.nick || '—';
    document.getElementById('passportPersona').innerText = user.persona || '—';
    const photoDiv = document.getElementById('passportPhoto');
    if (user.avatarBase64) photoDiv.style.backgroundImage = `url('${user.avatarBase64}')`;
    const myPosts = posts.filter(p => p.authorId === currentUser.uid);
    document.getElementById('passportMomentsCount').innerText = myPosts.length;
    const visaContainer = document.getElementById('visaGrid');
    visaContainer.innerHTML = '<div class="visa-card">🌟 Виза доверия активна</div>';
  }

  function renderChatList(filter = '') {
    if (!currentUser) return;
    const container = document.getElementById('chatList');
    container.innerHTML = '';
    let list = Object.values(usersCache).filter(u => u.id !== currentUser.uid);
    const query = filter.toLowerCase().trim();
    if (query) {
      list = list.filter(u => (u.name || '').toLowerCase().includes(query) || (u.nick || '').toLowerCase().includes(query));
    }
    list.forEach(u => {
      const key = chatKey(currentUser.uid, u.id);
      const msgs = messages[key] || [];
      const lastMsg = msgs[msgs.length - 1];
      const chatDiv = document.createElement('div');
      chatDiv.className = 'chat-item' + (currentChatUserId === u.id ? ' active' : '');
      chatDiv.dataset.chatId = u.id;
      chatDiv.innerHTML = `
        <div class="chat-avatar">${u.avatarBase64 ? `<img src="${u.avatarBase64}">` : ''}</div>
        <div><div style="font-weight:600;">${u.name || u.email}</div><div style="font-size:12px;">${lastMsg ? lastMsg.text.substring(0, 35) : (u.nick || 'Нет сообщений')}</div></div>
      `;
      chatDiv.addEventListener('click', () => {
        currentChatUserId = u.id;
        renderChatList();
        listenMessagesForChat(currentUser.uid, currentChatUserId);
      });
      container.appendChild(chatDiv);
    });
    if (currentChatUserId) listenMessagesForChat(currentUser.uid, currentChatUserId);
  }

  function renderChatDialog() {
    if (!currentUser || !currentChatUserId) return;
    const other = usersCache[currentChatUserId];
    if (!other) return;
    document.getElementById('chatDialogName').innerText = other.name || '';
    document.getElementById('chatDialogNick').innerText = other.nick || '';
    const avatarContainer = document.getElementById('chatDialogAvatar');
    avatarContainer.innerHTML = other.avatarBase64 ? `<img src="${other.avatarBase64}" style="width:100%;height:100%;object-fit:cover;">` : '';
    const body = document.getElementById('chatDialogBody');
    body.innerHTML = '';
    const key = chatKey(currentUser.uid, currentChatUserId);
    const msgs = messages[key] || [];
    msgs.forEach(m => {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg ' + (m.fromId === currentUser.uid ? 'me' : 'them');
      msgDiv.innerHTML = `<div>${m.text}</div><div style="font-size:10px; margin-top:6px;">${m.time}</div>`;
      body.appendChild(msgDiv);
    });
    body.scrollTop = body.scrollHeight;
  }

  function renderRecommendations() {
    const recContainer = document.getElementById('recommendationsList');
    if (!recContainer) return;
    recContainer.innerHTML = '';
    Object.values(usersCache).filter(u => u.id !== currentUser?.uid).slice(0, 6).forEach(u => {
      const card = document.createElement('div');
      card.style.padding = '12px 16px';
      card.style.border = '1px solid #d6c8b2';
      card.style.borderRadius = '24px';
      card.style.marginBottom = '10px';
      card.style.cursor = 'pointer';
      card.innerText = u.name || u.email;
      card.addEventListener('click', () => {
        viewProfileUserId = u.id;
        renderProfile();
        renderProfileGrid();
        showScreen('profile');
      });
      recContainer.appendChild(card);
    });
  }

  // ========== ЧАСТЬ 4: АВТОРИЗАЦИЯ И ОСНОВНЫЕ СОБЫТИЯ ==========
  async function afterLogin(user) {
    currentUser = user;
    viewProfileUserId = user.uid;
    await ensureUserDoc(user);
    document.getElementById('loginWrapper').style.display = 'none';
    document.getElementById('appRoot').style.display = 'flex';
    listenUsers();
    listenPosts();
    listenStiki();
    currentChatUserId = null;
    renderChatList();
    showScreen('posts');
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
    try {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      await afterLogin(cred.user);
    } catch (e) {
      document.getElementById('loginError').innerText = e.message;
    }
  });

  document.getElementById('registerBtn').addEventListener('click', async () => {
    const file = document.getElementById('regAvatar').files[0];
    try {
      const name = document.getElementById('regName').value.trim();
      const nick = document.getElementById('regNick').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;
      const pass2 = document.getElementById('regPass2').value;
      if (!name || !nick || !email || !pass || pass !== pass2) throw new Error('Заполни все поля и проверь пароль');
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      let avatarBase64 = '';
      if (file) {
        const compressed = await compressImage(file, 200, 0.7);
        avatarBase64 = await imageToBase64(compressed);
      }
      await db.collection('users').doc(cred.user.uid).set({
        name, nick, email, avatarBase64, bio: '', persona: '', followers: 0, following: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await afterLogin(cred.user);
    } catch (e) {
      document.getElementById('loginError').innerText = e.message;
    }
  });

  document.getElementById('feedPublishBtn').addEventListener('click', async () => {
    const text = document.getElementById('feedText').value.trim();
    const file = document.getElementById('feedImage').files[0];
    if (!text || !file) return alert('Нужен текст и фото');
    const compressed = await compressImage(file, 1080, 0.8);
    const b64 = await imageToBase64(compressed);
    await db.collection('posts').add({
      authorId: currentUser.uid, text, imageBase64: b64,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('feedText').value = '';
    document.getElementById('feedImage').value = '';
  });

  document.getElementById('stikiPublishBtn').addEventListener('click', async () => {
    const file = document.getElementById('stikiInput').files[0];
    if (!file) return alert('Выбери видео');
    const ref = storage.ref().child(`stiki/${currentUser.uid}/${Date.now()}.mp4`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    await db.collection('stiki').add({
      authorId: currentUser.uid, videoURL: url,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('stikiInput').value = '';
  });

  document.getElementById('chatSendBtn').addEventListener('click', async () => {
    const text = document.getElementById('chatInput').value.trim();
    if (!text || !currentChatUserId) return;
    const key = chatKey(currentUser.uid, currentChatUserId);
    await db.collection('chats').doc(key).set({ user1: currentUser.uid, user2: currentChatUserId }, { merge: true });
    await db.collection('chats').doc(key).collection('messages').add({
      fromId: currentUser.uid, toId: currentChatUserId, text,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('chatInput').value = '';
  });

  document.getElementById('editProfileBtn').addEventListener('click', () => {
    const u = usersCache[currentUser.uid];
    document.getElementById('editProfileNameInput').value = u.name || '';
    document.getElementById('editProfileNickInput').value = u.nick || '';
    document.getElementById('editProfilePersonaInput').value = u.persona || '';
    document.getElementById('editProfileBioInput').value = u.bio || '';
    document.getElementById('editProfileModal').classList.add('active');
  });

  document.getElementById('editProfileSave').addEventListener('click', async () => {
    const file = document.getElementById('editProfileAvatarInput').files[0];
    const update = {
      name: document.getElementById('editProfileNameInput').value,
      nick: document.getElementById('editProfileNickInput').value,
      persona: document.getElementById('editProfilePersonaInput').value,
      bio: document.getElementById('editProfileBioInput').value
    };
    if (file) {
      const compressed = await compressImage(file, 200, 0.7);
      update.avatarBase64 = await imageToBase64(compressed);
    }
    await db.collection('users').doc(currentUser.uid).update(update);
    document.getElementById('editProfileModal').classList.remove('active');
    renderProfile();
    renderPassport();
  });

  document.getElementById('editProfileCancel').addEventListener('click', () => {
    document.getElementById('editProfileModal').classList.remove('active');
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await auth.signOut();
  });

  document.getElementById('profileMessageBtn').addEventListener('click', () => {
    if (viewProfileUserId && viewProfileUserId !== currentUser.uid) {
      currentChatUserId = viewProfileUserId;
      showScreen('chats');
      listenMessagesForChat(currentUser.uid, currentChatUserId);
    }
  });

  document.getElementById('chatHeaderProfile').addEventListener('click', () => {
    if (currentChatUserId) {
      viewProfileUserId = currentChatUserId;
      renderProfile();
      renderProfileGrid();
      showScreen('profile');
    }
  });

  document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const screen = item.dataset.screen;
      if (screen === 'profile') {
        viewProfileUserId = currentUser.uid;
        renderProfile();
        renderProfileGrid();
      }
      showScreen(screen);
    });
  });

  document.getElementById('userSearch').addEventListener('input', (e) => {
    renderChatList(e.target.value);
    renderRecommendations();
  });

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      await afterLogin(user);
    } else {
      currentUser = null;
      document.getElementById('loginWrapper').style.display = 'flex';
      document.getElementById('appRoot').style.display = 'none';
      if (unsubPosts) unsubPosts();
      if (unsubStiki) unsubStiki();
      if (unsubMessages) unsubMessages();
      if (unsubUsers) unsubUsers();
    }
  });
</script>
</body>
</html>
