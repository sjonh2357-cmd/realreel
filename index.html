<!DOCTYPE html>

  <style>
    /* ========== БАЗА ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
    body { min-height: 100vh; background: #fafafa; }
    
    /* ========== ЛОГИН ========== */
    .login-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1950&auto=format') center/cover no-repeat; z-index: 2000; }
    .login-wrapper::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); }
    .login-card { position: relative; z-index: 10; width: 100%; max-width: 400px; margin: 16px; background: white; border-radius: 28px; padding: 32px 28px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .login-logo { font-size: 34px; font-weight: 800; font-family: 'Montserrat Alternates', sans-serif; letter-spacing: 4px; background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFD93D, #6BCB77, #4D96FF); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 4px; }
    .login-underline { width: 60px; height: 3px; background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFD93D, #6BCB77, #4D96FF); margin: 6px auto 12px; border-radius: 4px; }
    .login-subtitle { font-size: 14px; color: #6b7280; margin: 8px 0; }
    .login-tabs { display: flex; gap: 10px; background: #f0f0f0; padding: 5px; border-radius: 60px; margin-bottom: 24px; }
    .login-tab { flex: 1; border: none; padding: 10px; border-radius: 60px; background: transparent; cursor: pointer; font-weight: 600; color: #6b7280; transition: all 0.2s; }
    .login-tab.active { background: #262626; color: white; }
    .login-input-wrapper { position: relative; margin-bottom: 16px; }
    .login-emoji { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
    .login-input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 16px; padding: 12px 16px 12px 48px; background: white; font-size: 14px; transition: all 0.2s; }
    .login-input:focus { outline: none; border-color: #262626; }
    .login-btn { width: 100%; border: none; border-radius: 40px; padding: 12px; background: #262626; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .login-btn:hover { background: #111; transform: translateY(-2px); }
    .login-error { color: #e86a6a; font-size: 13px; margin-top: 10px; }
    
    /* ========== APP ========== */
    .app { display: none; flex-direction: column; min-height: 100vh; background: #fafafa; }
    
    /* ========== ТОПБАР ========== */
    .topbar { height: 60px; background: white; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
    .brand { font-size: 24px; font-weight: 800; font-family: 'Montserrat Alternates', sans-serif; letter-spacing: 3px; background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFD93D, #6BCB77, #4D96FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .search-wrapper { position: relative; width: 260px; }
    .search { width: 100%; border-radius: 60px; border: 1px solid #dbdbdb; padding: 8px 16px; background: #fafafa; font-size: 14px; }
    .search:focus { outline: none; border-color: #262626; }
    .search-dropdown { position: absolute; top: 45px; left: 0; width: 100%; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid #dbdbdb; z-index: 200; display: none; max-height: 300px; overflow-y: auto; }
    .search-dropdown.active { display: block; }
    .search-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .search-item:hover { background: #fafafa; }
    .search-avatar { width: 40px; height: 40px; border-radius: 50%; background: #efefef; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* ========== УВЕДОМЛЕНИЯ ========== */
    .notifications-icon { position: relative; cursor: pointer; margin-left: 12px; }
    .notifications-badge { position: absolute; top: -5px; right: -8px; background: #ed4956; color: white; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 20px; display: none; }
    .notifications-dropdown { position: absolute; top: 50px; right: 0; width: 320px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid #dbdbdb; z-index: 200; display: none; max-height: 400px; overflow-y: auto; }
    .notifications-dropdown.active { display: block; }
    .notification-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px; }
    
    /* ========== MAIN ROW ========== */
    .main-row { display: flex; flex: 1; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    
    /* ========== ПРАВАЯ НАВИГАЦИЯ ========== */
    .right-nav { width: 80px; background: white; border-left: 1px solid #dbdbdb; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
    .nav-item { width: 52px; height: 52px; border-radius: 999px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8e8e8e; transition: all 0.2s; }
    .nav-item:hover { background: rgba(0,0,0,0.05); transform: scale(1.05); }
    .nav-item.active { background: #262626; color: white; }
    .nav-item svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 2; fill: none; }
    .nav-label { font-size: 11px; color: #8e8e8e; margin-top: 4px; text-align: center; }
    .nav-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    
    /* ========== ЭКРАНЫ ========== */
    .screen { display: none; }
    .screen.active { display: block; }
    
    /* ========== FEED ========== */
    .feed-composer { max-width: 600px; margin: 0 auto 20px; background: white; border-radius: 16px; padding: 16px; border: 1px solid #dbdbdb; }
    .feed-composer textarea { width: 100%; border: 1px solid #dbdbdb; border-radius: 12px; padding: 12px; resize: vertical; min-height: 70px; font-size: 14px; }
    .feed-publish-btn { background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFD93D, #6BCB77, #4D96FF); border: none; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; transition: transform 0.2s; }
    .feed-list { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .feed-post { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #dbdbdb; }
    .post-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
    .post-author-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .post-avatar-small { width: 36px; height: 36px; border-radius: 50%; background: #efefef; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .default-avatar-icon { width: 36px; height: 36px; background: #dbdbdb; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .default-avatar-icon svg, .default-avatar-icon-big svg { width: 20px; height: 20px; stroke: #8e8e8e; stroke-width: 2; fill: none; }
    .default-avatar-icon-big { width: 100px; height: 100px; background: #dbdbdb; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .default-avatar-icon-big svg { width: 50px; height: 50px; }
    .post-author-name { font-weight: 600; font-size: 14px; color: #262626; }
    .post-date { font-size: 11px; color: #8e8e8e; }
    .feed-post-image { width: 100%; max-height: 500px; background: #f0f0f0; cursor: pointer; overflow: hidden; }
    .feed-post-image img { width: 100%; height: auto; object-fit: contain; transition: transform 0.3s ease; }
    .post-actions-top { display: flex; align-items: center; gap: 15px; padding: 4px 16px; border-bottom: 1px solid #efefef; }
    .action-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #262626; padding: 4px 0; border-radius: 8px; transition: all 0.2s; }
    .action-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
    .action-btn.liked svg path { fill: #ed4956; stroke: #ed4956; }
    .action-count { font-size: 14px; font-weight: 500; }
    .feed-post-text { padding: 12px 16px; font-size: 14px; color: #262626; }
    .comments-section { padding: 0 16px 12px; border-top: 1px solid #efefef; }
    .comment-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .comment-input-wrapper { display: flex; gap: 8px; padding: 8px 0; border-top: 1px solid #efefef; margin-top: 8px; }
    .comment-input { flex: 1; border: none; padding: 8px 0; font-size: 13px; outline: none; }
    .comment-submit { background: none; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }
    
    /* ========== ЧАТЫ ========== */
    .chats-layout { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 140px); min-height: 500px; background: white; border-radius: 16px; overflow: hidden; border: 1px solid #dbdbdb; }
    .chat-list { background: #fafafa; border-right: 1px solid #dbdbdb; overflow-y: auto; height: 100%; }
    .chat-item { display: flex; align-items: center; gap: 14px; padding: 14px; cursor: pointer; border-bottom: 1px solid #efefef; transition: background 0.2s; }
    .chat-item.active { background: rgba(0,0,0,0.05); }
    .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: #efefef; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; color: #262626; }
    .chat-last-message { font-size: 12px; color: #8e8e8e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-dialog { display: flex; flex-direction: column; height: 100%; background-color: #fafafa; position: relative; background-size: cover; background-position: center; transition: background 0.2s; }
    .chat-dialog-header { padding: 14px; border-bottom: 1px solid #dbdbdb; background: rgba(255,255,255,0.95); cursor: pointer; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-dialog-header-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #efefef; }
    .chat-dialog-body { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: rgba(250,250,250,0.85); }
    .msg { max-width: 70%; padding: 8px 12px; border-radius: 18px; font-size: 14px; display: flex; flex-direction: column; }
    .msg-time { font-size: 10px; opacity: 0.7; margin-bottom: 4px; }
    .msg.me { margin-left: auto; background: #0095f6; color: white; }
    .msg.them { background: white; color: #262626; border: 1px solid #dbdbdb; }
    .chat-dialog-input { display: flex; gap: 12px; padding: 14px; border-top: 1px solid #dbdbdb; background: white; flex-shrink: 0; }
    .chat-dialog-input input { flex: 1; border-radius: 40px; border: 1px solid #dbdbdb; padding: 12px 16px; font-size: 14px; background: white; }
    .chat-dialog-input button { border-radius: 40px; border: none; padding: 12px 20px; background: #0095f6; color: white; cursor: pointer; }
    .chat-bg-btn { background: none; border: none; margin-left: 8px; cursor: pointer; color: #0095f6; font-size: 20px; }
    
    /* ========== ПРОФИЛЬ ========== */
    .profile-header { max-width: 760px; margin: 0 auto 24px; background: white; border-radius: 16px; border: 1px solid #dbdbdb; }
    .profile-cover { height: 140px; transition: background 0.3s; }
    .profile-avatar-wrap { display: flex; justify-content: center; margin-top: -50px; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; overflow: hidden; background: #dbdbdb; display: flex; align-items: center; justify-content: center; }
    .profile-info { text-align: center; padding: 0 20px 20px; }
    .profile-name { font-size: 22px; font-weight: 700; color: #262626; }
    .profile-stats { display: flex; justify-content: center; gap: 28px; margin: 16px 0; cursor: pointer; color: #262626; }
    .profile-bio { font-size: 14px; margin: 12px auto; padding: 12px 20px; background: #fafafa; border-radius: 20px; max-width: 80%; color: #262626; }
    .profile-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: #0095f6; color: white; border: none; border-radius: 8px; padding: 8px 20px; font-weight: 600; cursor: pointer; }
    .btn-ghost { background: #efefef; color: #262626; border: none; border-radius: 8px; padding: 8px 20px; font-weight: 600; cursor: pointer; }
    .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 760px; margin: 0 auto; }
    .profile-grid-item { aspect-ratio: 1/1; background: #efefef; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .profile-grid-item img { width: 100%; height: 100%; object-fit: cover; }
    .visa-card { background: white; border-radius: 12px; padding: 16px; border: 1px solid #dbdbdb; text-align: center; }
    .settings-panel { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; border: 1px solid #dbdbdb; }
    .patterns-grid { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .pattern-card { width: 100px; cursor: pointer; text-align: center; }
    .pattern-preview { width: 100px; height: 60px; border-radius: 12px; margin-bottom: 8px; border: 2px solid transparent; }
    .pattern-card.selected .pattern-preview { border-color: #262626; }
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; border-top: 1px solid #dbdbdb; justify-content: space-around; align-items: center; z-index: 500; }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; cursor: pointer; color: #8e8e8e; }
    .mobile-nav-item.active { color: #262626; }
    .mobile-nav-item svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-backdrop.active { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 24px; max-width: 420px; width: 90%; }
    .modal input, .modal textarea { width: 100%; margin-bottom: 12px; border-radius: 8px; border: 1px solid #dbdbdb; padding: 12px; }
    @media (max-width: 720px) { .right-nav { display: none; } .mobile-nav { display: flex; } .content { padding-bottom: 90px; } .chats-layout { grid-template-columns: 1fr; } }
  </style>

</head>

<div class="app" id="appRoot">

  <div class="main-row"><main class="content">

<script>
// FIREBASE CONFIG
const firebaseConfig = { apiKey: "AIzaSyAnw1Vz4Wzr2rmdrzVv5tga_x6u08ObNbA", authDomain: "renitea-b140f.firebaseapp.com", projectId: "renitea-b140f", storageBucket: "renitea-b140f.appspot.com", messagingSenderId: "806278733594", appId: "1:806278733594:web:d9887a35732173429f96a3" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage();

// STATE
let currentUser = null, usersCache = {}, posts = [], messages = {}, comments = {}, postReactions = {}, currentChatUserId = null, chatUnsub = null, allChatUnsub = null, unsubUsers = null, unsubPosts = null, unsubComments = null, unsubReactions = null;

// HELPERS
function escapeHtml(s) { return s ? s.replace(/[&<>]/g, function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}) : ''; }
function formatMessageTime(ts) { if(!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}); }
function formatMessageDate(ts) { if(!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts); const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); const msgDate = new Date(d.getFullYear(), d.getMonth(), d.getDate()); if(msgDate.getTime() === today.getTime()) return formatMessageTime(ts); const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1); if(msgDate.getTime() === yesterday.getTime()) return `Вчера ${formatMessageTime(ts)}`; return `${d.toLocaleDateString('ru-RU')} ${formatMessageTime(ts)}`; }
function chatKey(a,b) { return [a,b].sort().join('__'); }
function renderAvatar(avatar) { if(avatar) return `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">`; return `<div class="default-avatar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg></div>`; }
function showScreen(name) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+name)?.classList.add('active'); document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(i=>{i.classList.remove('active'); if(i.dataset.screen===name)i.classList.add('active');}); }

// ЛОГИКА ЛАЙКОВ, КОММЕНТОВ, ПОСТОВ
async function toggleLike(postId) { if(!currentUser) return; const ref = db.collection('reactions').doc(`${postId}_${currentUser.uid}`); const snap = await ref.get(); snap.exists ? await ref.delete() : await ref.set({postId, userId:currentUser.uid, type:'like', createdAt:firebase.firestore.FieldValue.serverTimestamp()}); }
async function addComment(postId, text) { if(!currentUser||!text.trim()) return; await db.collection('comments').add({postId, authorId:currentUser.uid, text:text.trim(), createdAt:firebase.firestore.FieldValue.serverTimestamp()}); }
async function deleteComment(id) { await db.collection('comments').doc(id).delete(); }

// ОТРИСОВКА ЛЕНТЫ
function renderFeed() { const container = document.getElementById('feedList'); if(!container) return; container.innerHTML = ''; if(!posts.length){ container.innerHTML='<div style="text-align:center;padding:40px;">📝 Нет постов</div>'; return; }
posts.forEach(post=>{ const likes = postReactions[post.id]||0; const isLiked = postReactions[post.id+'_user']; const author = usersCache[post.authorId]||{name:'Аноним'}; const commentsList = comments[post.id]||[]; const card = document.createElement('div'); card.className='feed-post'; card.innerHTML=`<div class="post-header"><div class="post-author-info" data-uid="${post.authorId}"><div class="post-avatar-small">${renderAvatar(author.avatarBase64)}</div><div><div class="post-author-name">${escapeHtml(author.name)}</div><div class="post-date">${post.createdAt?new Date(post.createdAt.toDate()).toLocaleString():''}</div></div></div></div><div class="feed-post-image">${post.imageBase64?`<img src="${post.imageBase64}">`:''}</div><div class="post-actions-top"><button class="action-btn like-btn ${isLiked?'liked':''}" data-id="${post.id}"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="${isLiked?'#ed4956':'none'}" stroke="${isLiked?'#ed4956':'currentColor'}"/></svg><span class="action-count">${likes}</span></button><button class="action-btn toggle-comments" data-id="${post.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="action-count">${commentsList.length}</span></button></div><div class="feed-post-text">${escapeHtml(post.text||'')}</div><div class="comments-section" id="comments-${post.id}" style="display:none;"><div class="comments-list">${commentsList.map(c=>`<div class="comment-item"><span><strong>${escapeHtml(usersCache[c.authorId]?.name||'User')}</strong> ${escapeHtml(c.text)}</span>${c.authorId===currentUser?.uid?`<button class="del-comment" data-id="${c.id}">🗑️</button>`:''}</div>`).join('')}</div><div class="comment-input-wrapper"><input class="comment-input" id="ci-${post.id}" placeholder="Комментарий..."><button class="comment-submit" data-id="${post.id}">Отправить</button></div></div>`; container.appendChild(card); });
document.querySelectorAll('.like-btn').forEach(b=>b.onclick=()=>toggleLike(b.dataset.id));
document.querySelectorAll('.toggle-comments').forEach(b=>{ const sec=document.getElementById(`comments-${b.dataset.id}`); b.onclick=()=>sec.style.display=sec.style.display==='none'?'block':'none'; });
document.querySelectorAll('.comment-submit').forEach(b=>{ b.onclick=async()=>{ const val=document.getElementById(`ci-${b.dataset.id}`).value; if(val)await addComment(b.dataset.id,val); }; });
document.querySelectorAll('.del-comment').forEach(b=>b.onclick=async()=>{ await deleteComment(b.dataset.id); });
document.querySelectorAll('.post-author-info').forEach(el=>el.onclick=()=>{ document.getElementById('screen-profile').classList.add('active'); showScreen('profile'); renderProfile(el.dataset.uid); renderProfileGrid(el.dataset.uid); }); }

// ЧАТЫ
async function setChatBackground(file) { if(!currentUser||!file) return; const reader=new FileReader(); reader.onload=async(e)=>{ await db.collection('users').doc(currentUser.uid).update({chatBackground:e.target.result}); if(currentChatUserId) loadChatBg(currentChatUserId); alert('✅ Фон чата сохранён!'); }; reader.readAsDataURL(file); }
function loadChatBg(userId) { const user=usersCache[userId]; const cont=document.getElementById('chatDialogContainer'); if(cont) cont.style.backgroundImage=user?.chatBackground?`url('${user.chatBackground}')`:'', cont.style.backgroundSize='cover', cont.style.backgroundPosition='center'; }
async function sendMessage() { const input=document.getElementById('chatInput'); const text=input?.value.trim(); if(!text||!currentUser||!currentChatUserId) return; const key=chatKey(currentUser.uid,currentChatUserId); await db.collection('chats').doc(key).set({user1:currentUser.uid,user2:currentChatUserId},{merge:true}); await db.collection('chats').doc(key).collection('messages').add({fromId:currentUser.uid,toId:currentChatUserId,text,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); input.value=''; }
function renderChatDialog() { const body=document.getElementById('chatDialogBody'); if(!body||!currentUser||!currentChatUserId) return; const other=usersCache[currentChatUserId]; if(!other) return; document.getElementById('chatDialogName').innerText=other.name||other.email; document.getElementById('chatDialogAvatar').innerHTML=renderAvatar(other.avatarBase64); const key=chatKey(currentUser.uid,currentChatUserId); const msgs=messages[key]||[]; body.innerHTML=''; if(!msgs.length){ body.innerHTML='<div style="text-align:center;padding:40px;">💬 Напишите сообщение...</div>'; } msgs.forEach(m=>{ const isMe=m.fromId===currentUser.uid; const div=document.createElement('div'); div.className=`msg ${isMe?'me':'them'}`; div.innerHTML=`<div class="msg-time">${formatMessageDate(m.createdAt)}</div><div class="msg-text">${escapeHtml(m.text)}</div>`; body.appendChild(div); }); body.scrollTop=body.scrollHeight; }
function renderChatList() { const list=document.getElementById('chatList'); if(!list||!currentUser) return; list.innerHTML=''; const unique=new Set(); Object.keys(messages).forEach(k=>{ const [a,b]=k.split('__'); if(a===currentUser.uid) unique.add(b); if(b===currentUser.uid) unique.add(a); }); let users=Object.values(usersCache).filter(u=>unique.has(u.id)); if(!users.length){ list.innerHTML='<div style="padding:20px;text-align:center;">💬 Нет чатов</div>'; return; } users.forEach(u=>{ const item=document.createElement('div'); item.className=`chat-item ${u.id===currentChatUserId?'active':''}`; item.innerHTML=`<div class="chat-avatar">${renderAvatar(u.avatarBase64)}</div><div class="chat-info"><div class="chat-name">${escapeHtml(u.name)}</div><div class="chat-last-message">...</div></div>`; item.onclick=()=>{ currentChatUserId=u.id; renderChatList(); if(chatUnsub)chatUnsub(); const key=chatKey(currentUser.uid,u.id); chatUnsub=db.collection('chats').doc(key).collection('messages').orderBy('createdAt').onSnapshot(snap=>{ messages[key]=snap.docs.map(d=>({id:d.id,...d.data()})); renderChatList(); renderChatDialog(); }); loadChatBg(u.id); }; list.appendChild(item); }); if(!currentChatUserId&&users.length){ currentChatUserId=users[0].id; const key=chatKey(currentUser.uid,currentChatUserId); if(chatUnsub)chatUnsub(); chatUnsub=db.collection('chats').doc(key).collection('messages').orderBy('createdAt').onSnapshot(snap=>{ messages[key]=snap.docs.map(d=>({id:d.id,...d.data()})); renderChatList(); renderChatDialog(); }); loadChatBg(currentChatUserId); } }

// ПРОФИЛЬ
async function toggleFollow(targetId) { if(!currentUser) return; const isFollow=(usersCache[currentUser.uid]?.following||[]).includes(targetId); if(isFollow){ await db.collection('users').doc(currentUser.uid).update({following:firebase.firestore.FieldValue.arrayRemove(targetId)}); await db.collection('users').doc(targetId).update({followers:firebase.firestore.FieldValue.arrayRemove(currentUser.uid)}); } else { await db.collection('users').doc(currentUser.uid).update({following:firebase.firestore.FieldValue.arrayUnion(targetId)}); await db.collection('users').doc(targetId).update({followers:firebase.firestore.FieldValue.arrayUnion(currentUser.uid)}); } }
function renderProfile(uid=currentUser?.uid) { const user=usersCache[uid]; if(!user) return; document.getElementById('profileName').innerText=user.name||'—'; document.getElementById('profileBio').innerText=user.bio||'—'; document.getElementById('profileFollowersCount').innerText=(user.followers||[]).length; document.getElementById('profileFollowingCount').innerText=(user.following||[]).length; const avatarImg=document.getElementById('profileAvatarImg'); const defaultDiv=document.querySelector('#profileAvatar .default-avatar-icon-big'); if(user.avatarBase64){ avatarImg.style.display='block'; avatarImg.src=user.avatarBase64; if(defaultDiv)defaultDiv.style.display='none'; } else { avatarImg.style.display='none'; if(defaultDiv)defaultDiv.style.display='flex'; } const patterns={1:'linear-gradient(135deg,#667eea,#764ba2)',2:'repeating-linear-gradient(45deg,#ff6cab,#ff6cab 20px,#ffdd59 20px,#ffdd59 40px)',3:'radial-gradient(circle at 20% 40%,#4cd964,#34aadc)',4:'linear-gradient(135deg,#f5f0e6,#e8d5b5)',5:'repeating-linear-gradient(90deg,#a8c9a5,#a8c9a5 20px,#c9b896 20px,#c9b896 40px)',6:'linear-gradient(135deg,#2c3e50,#3498db)'}; document.getElementById('profileCover').style.background=patterns[user.headerPattern||'1']; const actions=document.getElementById('profileActions'); actions.innerHTML=''; if(uid===currentUser?.uid){ actions.innerHTML=`<button class="btn-primary" id="editProfileBtn">Редактировать</button><button class="btn-ghost" id="logoutBtn">Выйти</button>`; document.getElementById('editProfileBtn')?.addEventListener('click',()=>document.getElementById('editProfileModal').classList.add('active')); document.getElementById('logoutBtn')?.addEventListener('click',()=>auth.signOut()); } else { const isFollow=(user.followers||[]).includes(currentUser?.uid); actions.innerHTML=`<button class="btn-primary" id="followBtn">${isFollow?'Отписаться':'Подписаться'}</button><button class="btn-ghost" id="msgBtn">Написать</button>`; document.getElementById('followBtn')?.addEventListener('click',()=>toggleFollow(uid)); document.getElementById('msgBtn')?.addEventListener('click',()=>{ currentChatUserId=uid; showScreen('chats'); renderChatList(); if(chatUnsub)chatUnsub(); const key=chatKey(currentUser.uid,uid); chatUnsub=db.collection('chats').doc(key).collection('messages').orderBy('createdAt').onSnapshot(snap=>{ messages[key]=snap.docs.map(d=>({id:d.id,...d.data()})); renderChatList(); renderChatDialog(); }); loadChatBg(uid); }); } document.getElementById('passportName').innerText=user.name; document.getElementById('passportNick').innerText=user.nick; document.getElementById('passportPersona').innerText=user.persona||'—'; document.getElementById('passportMomentsCount').innerText=posts.filter(p=>p.authorId===uid).length; const visaDiv=document.getElementById('visaGrid'); if(visaDiv) visaDiv.innerHTML=`<div class="visa-card">🎨 Виза творчества: ${posts.filter(p=>p.authorId===uid).length} постов</div><div class="visa-card">👥 Виза сообщества: ${(user.followers||[]).length} подписчиков</div><div class="visa-card">💬 Виза общения: ${(user.following||[]).length} подписок</div>`; const nftDiv=document.getElementById('nftPixelGrid'); if(nftDiv) nftDiv.innerHTML=`<h3>🖼️ NFT-галерея</h3>`+posts.filter(p=>p.authorId===uid).map((p,i)=>`<div class="visa-card" style="padding:8px;">${p.imageBase64?`<img src="${p.imageBase64}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;">`:'<div style="aspect-ratio:1;background:#efefef;"></div>'}<div>NFT #${i+1}</div></div>`).join(''); }
function renderProfileGrid(uid=currentUser?.uid) { const grid=document.getElementById('profileGrid'); if(!grid) return; grid.innerHTML=''; const userPosts=posts.filter(p=>p.authorId===uid); if(!userPosts.length){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;">📷 Нет постов</div>'; return; } userPosts.forEach(p=>{ const div=document.createElement('div'); div.className='profile-grid-item'; div.innerHTML=p.imageBase64?`<img src="${p.imageBase64}">`:'<div style="display:flex;align-items:center;justify-content:center;height:100%;">📷</div>'; grid.appendChild(div); }); }

// ЛИСТЕНЕРЫ
function listenUsers() { if(unsubUsers)unsubUsers(); unsubUsers=db.collection('users').onSnapshot(snap=>{ snap.docChanges().forEach(c=>{ if(c.type==='removed')delete usersCache[c.doc.id]; else usersCache[c.doc.id]={id:c.doc.id,...c.doc.data()}; }); renderFeed(); renderProfile(); renderProfileGrid(); renderChatList(); }); }
function listenPosts() { if(unsubPosts)unsubPosts(); unsubPosts=db.collection('posts').orderBy('createdAt','desc').onSnapshot(snap=>{ posts=snap.docs.map(d=>({id:d.id,...d.data()})); renderFeed(); renderProfileGrid(); renderProfile(); }); }
function listenComments() { if(unsubComments)unsubComments(); unsubComments=db.collection('comments').onSnapshot(snap=>{ const newComments={}; snap.docs.forEach(d=>{ const data=d.data(); if(!newComments[data.postId])newComments[data.postId]=[]; newComments[data.postId].push({id:d.id,authorId:data.authorId,text:data.text,createdAt:data.createdAt}); }); comments=newComments; renderFeed(); }); }
function listenReactions() { if(unsubReactions)unsubReactions(); unsubReactions=db.collection('reactions').onSnapshot(snap=>{ const newMap={}; snap.docs.forEach(d=>{ const data=d.data(); if(!newMap[data.postId])newMap[data.postId]=0; newMap[data.postId]++; if(currentUser&&data.userId===currentUser.uid)newMap[data.postId+'_user']=true; }); postReactions=newMap; renderFeed(); }); }

// ЛОГИН/РЕГ
async function handleLogin() { try{ const cred=await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value,document.getElementById('loginPass').value); afterLogin(cred.user); }catch(e){ document.getElementById('loginError').innerText='❌ Ошибка входа'; } }
async function handleRegister() { const name=document.getElementById('regName').value, nick=document.getElementById('regNick').value, email=document.getElementById('regEmail').value, pass=document.getElementById('regPass').value, pass2=document.getElementById('regPass2').value; if(pass!==pass2){document.getElementById('loginError').innerText='❌ Пароли не совпадают';return;} try{ const cred=await auth.createUserWithEmailAndPassword(email,pass); await db.collection('users').doc(cred.user.uid).set({name,nick:nick.startsWith('@')?nick:'@'+nick,email,avatarBase64:'',bio:'',persona:'',headerPattern:'1',followers:[],following:[],chatBackground:''}); afterLogin(cred.user); }catch(e){ document.getElementById('loginError').innerText='❌ Ошибка регистрации'; } }
function afterLogin(user) { currentUser=user; document.getElementById('loginWrapper').style.display='none'; document.getElementById('appRoot').style.display='flex'; listenUsers(); listenPosts(); listenComments(); listenReactions(); renderProfile(); renderProfileGrid(); renderChatList(); showScreen('posts'); document.getElementById('chatBgButton')?.addEventListener('click',()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>e.target.files[0]&&setChatBackground(e.target.files[0]); inp.click(); }); }

// НАВИГАЦИЯ И ЗАПУСК
document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(el=>el.addEventListener('click',()=>{ const s=el.dataset.screen; if(s==='profile')renderProfile(); if(s==='chats')renderChatList(); showScreen(s); }));
document.getElementById('feedPublishBtn')?.addEventListener('click',async()=>{ const text=document.getElementById('feedText').value; const file=document.getElementById('feedImage').files[0]; let img=''; if(file){ const reader=new FileReader(); img=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(file);}); } await db.collection('posts').add({authorId:currentUser.uid,text,imageBase64:img,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); document.getElementById('feedText').value=''; document.getElementById('feedImage').value=''; });
document.getElementById('chatSendBtn')?.addEventListener('click',sendMessage);
document.getElementById('chatInput')?.addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});
document.getElementById('logoutSettingsBtn')?.addEventListener('click',()=>auth.signOut());
document.getElementById('editProfileSave')?.addEventListener('click',async()=>{ const name=document.getElementById('editProfileNameInput').value; const nick=document.getElementById('editProfileNickInput').value; const persona=document.getElementById('editProfilePersonaInput').value; const bio=document.getElementById('editProfileBioInput').value; const file=document.getElementById('editProfileAvatarInput').files[0]; let avatar=usersCache[currentUser.uid]?.avatarBase64||''; if(file){ const reader=new FileReader(); avatar=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(file);}); } await db.collection('users').doc(currentUser.uid).update({name,nick,persona,bio,avatarBase64:avatar}); document.getElementById('editProfileModal').classList.remove('active'); renderProfile(); });
document.getElementById('editProfileCancel')?.addEventListener('click',()=>document.getElementById('editProfileModal').classList.remove('active'));
document.getElementById('followersStat')?.addEventListener('click',()=>{ const modal=document.getElementById('followersModal'); const list=document.getElementById('followersList'); const user=usersCache[currentUser?.uid]; list.innerHTML=(user?.followers||[]).map(fid=>`<div style="padding:8px;">${usersCache[fid]?.name||'Пользователь'}</div>`).join(''); modal.classList.add('active'); });
document.getElementById('followingStat')?.addEventListener('click',()=>{ const modal=document.getElementById('followersModal'); const list=document.getElementById('followersList'); const user=usersCache[currentUser?.uid]; list.innerHTML=(user?.following||[]).map(fid=>`<div style="padding:8px;">${usersCache[fid]?.name||'Пользователь'}</div>`).join(''); modal.classList.add('active'); });
document.getElementById('closeFollowersModal')?.addEventListener('click',()=>document.getElementById('followersModal').classList.remove('active'));
document.querySelectorAll('.pattern-card').forEach(card=>card.addEventListener('click',async()=>{ const pattern=card.dataset.pattern; await db.collection('users').doc(currentUser.uid).update({headerPattern:pattern}); renderProfile(); }));
document.querySelectorAll('.login-tab').forEach(tab=>tab.addEventListener('click',()=>{ document.querySelectorAll('.login-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); const isLogin=tab.dataset.tab==='login'; document.getElementById('loginForm').style.display=isLogin?'block':'none'; document.getElementById('registerForm').style.display=isLogin?'none':'block'; }));
document.getElementById('loginBtn')?.addEventListener('click',handleLogin);
document.getElementById('registerBtn')?.addEventListener('click',handleRegister);
auth.onAuthStateChanged(user=>{ if(user){ afterLogin(user); } else { currentUser=null; document.getElementById('loginWrapper').style.display='flex'; document.getElementById('appRoot').style.display='none'; if(unsubUsers)unsubUsers(); if(unsubPosts)unsubPosts(); if(unsubComments)unsubComments(); if(unsubReactions)unsubReactions(); if(chatUnsub)chatUnsub(); } });
</script>
</body>
</html>
