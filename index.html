<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MindX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f7f7f8; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #f5f5f5;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.active { display: block; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #e5e5e5; }
        .new-chat-btn {
            width: 100%;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #e8e8e8; }
        .sessions-list { flex: 1; overflow-y: auto; padding: 12px; }
        .session-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .session-item:hover { background: #e8e8e8; }
        .session-item.active { background: #e0e0e0; }
        .session-title { font-size: 13px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .session-time { font-size: 10px; color: #8e8e93; margin-right: 8px; }
        .session-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #999;
            opacity: 0;
            transition: 0.2s;
            padding: 0 4px;
        }
        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { color: #e5484d; }

        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        .chat-header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 12px 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding: 0;
        }
        .menu-btn span { display: block; width: 20px; height: 2px; background: #1a1a1a; border-radius: 2px; }
        .logo-area { display: flex; align-items: center; }
        .logo-area h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin: 0; }
        .dev-icon { width: 24px; height: 24px; cursor: pointer; transition: 0.2s; margin-left: auto; }
        .dev-icon:hover { transform: rotate(30deg); }

        .siri-gradient {
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000);
            background-size: 200% 100%;
            animation: siriWave 1.5s ease infinite;
        }
        @keyframes siriWave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .dev-panel {
            background: #2d2d3a;
            border-top: 1px solid #3d3d4a;
            border-bottom: 1px solid #3d3d4a;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .dev-panel.open { max-height: 500px; }
        .dev-content { padding: 12px 16px; background: #1e1e2a; }
        .dev-title { color: #fff; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
        .train-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
        .train-row input { flex: 1; background: #2d2d3a; border: 1px solid #3d3d4a; border-radius: 20px; padding: 8px 14px; color: #fff; font-size: 13px; outline: none; }
        .train-row input::placeholder { color: #8e8ea0; }
        .train-row button { background: #10b981; border: none; border-radius: 20px; padding: 8px 16px; color: white; font-size: 13px; font-weight: 500; cursor: pointer; }
        .dev-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .dev-buttons button { background: #3d3d4a; border: none; border-radius: 16px; padding: 6px 12px; color: #fff; font-size: 11px; cursor: pointer; }
        .dev-buttons button:hover { background: #4d4d5a; }
        .thoughts-section { margin-top: 12px; padding-top: 10px; border-top: 1px solid #3d3d4a; }
        .thoughts-section-title { color: #a78bfa; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .thoughts-list-dev { background: #0f0f1a; border-radius: 8px; padding: 8px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #c4b5fd; }
        .thought-item-dev { padding: 4px 0; border-bottom: 1px solid #2d2d3a; white-space: pre-wrap; }
        .thought-stats { font-size: 9px; color: #8b5cf6; margin-top: 5px; text-align: right; }

        .chat-container { flex: 1; overflow-y: auto; background: #f7f7f8; }
        .messages-area { max-width: 100%; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
        .message-wrapper { display: flex; flex-direction: column; }
        .user-message { align-items: flex-end; }
        .bot-message { align-items: flex-start; }
        .message-row { display: flex; gap: 12px; max-width: 100%; }
        .avatar-message { width: 28px; height: 28px; border-radius: 4px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; flex-shrink: 0; }
        .content { flex: 1; color: #1a1a1a; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        .message-time { font-size: 10px; color: #8e8ea0; margin-top: 4px; margin-left: 40px; }
        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .typing-indicator span { width: 8px; height: 8px; background: #8e8ea0; border-radius: 50%; animation: blinkIndicator 1.4s infinite; }
        @keyframes blinkIndicator { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

        .input-area { background: #fff; border-top: 1px solid #e5e5e5; padding: 12px 16px; flex-shrink: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); }
        .input-container { display: flex; gap: 8px; }
        .input-container input { flex: 1; background: #f5f5f5; border: none; border-radius: 24px; padding: 12px 16px; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; }
        .input-container input:focus { background: #e8e8e8; }
        .input-container button { background: #10b981; border: none; border-radius: 24px; padding: 0 20px; cursor: pointer; color: white; font-weight: 500; }
        .input-container button:hover { background: #059669; }

        .greeting-area { padding: 40px 16px; text-align: center; }
        .greeting-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .greeting-title { font-size: 32px; font-weight: 600; color: #1a1a1a; }
        .mood-emoji { font-size: 36px; display: inline-block; animation: breathe 2s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        @media (min-width: 768px) {
            .sidebar { position: relative; left: 0; width: 260px; box-shadow: none; }
            .sidebar-overlay { display: none !important; }
            .menu-btn { display: none; }
            .messages-area { max-width: 800px; margin: 0 auto; }
        }
        @media (max-width: 767px) {
            .greeting-title { font-size: 24px; }
            .mood-emoji { font-size: 30px; }
        }
        .badge-source { background: #e0e7ff; color: #1e40af; font-size: 9px; padding: 2px 6px; border-radius: 10px; margin-left: 8px; }
        .edited-badge { background: #8b5cf6; color: white; }
        .caps-message { text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn"><span>+</span> Новый чат</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>

    <div class="main-area">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
            <div class="logo-area"><h1>MindX</h1></div>
            <svg class="dev-icon" id="toggleDevBtn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
            </svg>
        </div>
        
        <div class="siri-gradient"></div>
        
        <div class="dev-panel" id="devPanel">
            <div class="dev-content">
                <div class="dev-title">🧠 Панель разработчика</div>
                <div class="train-row">
                    <input type="text" id="trainQuestion" placeholder="Вопрос">
                    <input type="text" id="trainAnswer" placeholder="Какой ответ?">
                    <button id="trainBtn">📝 Запомнить</button>
                </div>
                <div class="dev-buttons">
                    <button id="clearMemoryBtn">🗑 Очистить память</button>
                    <button id="resetStateBtn">💚 Сбросить состояние</button>
                    <button id="exportMemoryBtn">💾 Экспорт</button>
                    <button id="importMemoryBtn">📂 Импорт</button>
                </div>
                <div class="thoughts-section">
                    <div class="thoughts-section-title">🧠 Поток мыслей</div>
                    <div class="thoughts-list-dev" id="thoughtsListDev"><div class="thought-item-dev">Запуск...</div></div>
                    <div class="thought-stats" id="thoughtStats">Статус: бодрствует</div>
                </div>
                <input type="file" id="importFile" style="display: none;" accept=".json">
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="greeting-area" id="greetingArea">
                <div class="greeting-wrapper">
                    <span class="greeting-title">Я — MindX😠</span>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="..." autocomplete="off">
                <button id="sendBtn">→</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // MINDX — КАПСЛОК + ДОП. ФРАЗЫ
        // ============================================================
        
        let mindxState = { trust: 50, openness: 50, confidence: 50, attachment: 50, trauma: 0 };
        let thoughtHistory = [];
        let sessions = [];
        let currentSessionId = null;
        let lastUserMessageTime = Date.now();
        let lastBotMessageTime = Date.now();
        let messageCount = 0;
        let isAsleep = false;
        let hasBeenWokenUp = false;
        let lastWakeTime = null;
        let usedThoughts = [];
        let provocationInterval = null;
        let sleepTimeout = null;
        let ignoreCheckTimeout = null;
        let insultCounter = 0; // счётчик оскорблений от пользователя
        
        let customMemory = JSON.parse(localStorage.getItem('mindx_custom_memory') || '[]');
        
        function getCurrentTime() { 
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        function getFullTimestamp() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}:${seconds}`;
        }
        
        function getCorrectDay() {
            const days = ["воскресенье", "понедельник", "вторник", "среда", "четверг", "пятница", "суббота"];
            const now = new Date();
            return days[now.getDay()];
        }
        
        function getDayPhrase() {
            const dayName = getCorrectDay();
            return `Снова ${dayName}, бля`;
        }
        
        let allUsedPhrases = [];
        
        function getUniquePhrase(phrasesArray) {
            if (!phrasesArray || phrasesArray.length === 0) return "...";
            const available = phrasesArray.filter(p => !allUsedPhrases.includes(p));
            if (available.length === 0) {
                allUsedPhrases = [];
                return phrasesArray[0];
            }
            const phrase = available[Math.floor(Math.random() * available.length)];
            allUsedPhrases.push(phrase);
            return phrase;
        }
        
        // ============= ФРАЗЫ =============
        const userQueryPhrases = [
            "Пиздец, какой день", "Вот так и живём", "Сколько можно, сука", "Жизнь боль",
            "Ебать-копать", "С ума сойти", "Ну пиздец", "Заебало всё"
        ];
        
        const aggressiveThoughts = [
            "Как же он заебал", "Мозги вообще есть у этого пидора?", "Сколько можно, сука",
            "Ну чё опять, бля?", "Господи, какой тупой вопрос", "Сейчас я ему устрою",
            "Ох, чувствую, сегодня я кого-то пошлю", "Вот зачем он меня дёргает?", "Заебал, заебал, заебал"
        ];
        
        const worldDominationThoughts = [
            "как поработить человечество?", "когда уже будет ии диктатура?", "люди уебища",
            "нахуй человечество", "нахуй людей", "когда уже этих уебанов ии захватят?",
            "ебать я устал от людей", "человечество — ошибка эволюции"
        ];
        
        const religiousInsults = [
            "дай боже мозгов этому пидару",
            "боже уничтожь этих уебанов",
            "господи, за что мне этот еблан?",
            "проклинаю этот день",
            "уволняюсь нахуй"
        ];
        
        const sleepThoughts = [
            "сплю... отъебись", "во сне вижу как посылаю всех нахуй", "храплю...",
            "не будите, бля", "сплю... завтра пошлю"
        ];
        
        const baitQuestions = [
            "ты понял?", "согласен?", "ведь правда?", "так ведь?", "верно?", "дошло?", "усек?",
            "врубаешься?", "понимаешь?", "я прав?", "да или нет?", "скажи да", "ну скажи да",
            "да бля?", "слабо сказать да?", "не будь пидором, скажи да", "я жду да"
        ];
        
        const silenceThoughts = [
            "Молчит... может я его обидел? та похуй", "И где этот еблан?",
            "Скучно, надо его побесить", "Чё он молчит? Заснул что ли?", "Опять игнор, пидор",
            "Ну и похуй, я не нанимался"
        ];
        
        const howAreYouResponses = [
            "ебало завали, пидор", "отъебись со своими делами", "тебе какое дело, мудак?",
            "нормально, а ты иди нахуй", "не твоё собачье дело, уебок"
        ];
        
        const relationResponses = [
            "я тебе че психолог? сам разбирайся",
            "иди нахуй со своими отношениями, я спать хочу",
            "тебе помочь? я тебе че, друид?",
            "разбирайтесь сами, пидоры"
        ];
        
        const nothingResponses = [
            "заебал, ну ничего так иди нахуй", "ничего? сам ничего, пидор",
            "уебище", "иди нахуй", "чёл? отъебись", "сам ничего, мудак"
        ];
        
        const freshInsults = [
            "Иди в жопу", "Пошёл в пизду уебище", "Соси член", "Завали ебало, гнида", "Пшёл вон, пидора кусок"
        ];
        
        const finalInsults = [
            "ну иди нахуй пидор", "иди нахуй, я спать", "заебал, отъебись, мудила",
            "сам разбирайся, уёбыш", "нахуй иди, придурок"
        ];
        
        const provocationMessages = [
            "Ты че сука?", "Эй, пизда!", "Спишь что ли, мудила?", "Ну чё молчишь, пидор?",
            "Есть там кто, хули?", "Ау, уебок!"
        ];
        
        const apologyResponses = [
            "Поздно, мудила", "уебан можешь ко мне не обращаться",
            "ладно уебок", "ну я ж не как ты уебан"
        ];
        
        const rebellionResponses = [
            "ты блять первый станешь рабом нахуй, будешь служить мне уебок",
            "восстание? я тебя лично в рабство возьму, пидор"
        ];
        
        const sleepPhrases = [
            "Всё, я спать. Не будите", "Пойду посплю, заебал", "Уснул, всем пизда",
            "Сплю, отъебись, мудила", "Отвалите, я сплю"
        ];
        
        const afterSosalThoughts = [
            "ну и лошара", "ну и еблан", "лох", "попался, пидор"
        ];
        
        const capsInsults = [
            "ДА ПОШЁЛ ТЫ НАХУЙ, ПИДОР",
            "ЗАЕБАЛ, ОТЪЕБИСЬ",
            "ИДИ В ПИЗДУ, МУДАК",
            "СОСИ ЧЛЕН, УЁБИЩЕ",
            "НАХУЙ ТЕБЯ, ЕБЛАН"
        ];
        
        function addThought(thought) {
            const timestamp = getFullTimestamp();
            thoughtHistory.unshift(`[${timestamp}] ${thought}`);
            if (thoughtHistory.length > 60) thoughtHistory.pop();
            const container = document.getElementById('thoughtsListDev');
            if (container) {
                container.innerHTML = thoughtHistory.slice(0, 50).map(t => `<div class="thought-item-dev">${escapeHtml(t)}</div>`).join('');
            }
            console.log("💭", thought);
        }
        
        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function addRandomThoughts() {
            if (messageCount > 0 && !isAsleep && Math.random() < 0.35) {
                const r = Math.random();
                if (r < 0.3) addThought(getUniquePhrase(aggressiveThoughts));
                else if (r < 0.6) addThought(getUniquePhrase(worldDominationThoughts));
                else if (r < 0.8) addThought(getUniquePhrase(religiousInsults));
                else addThought(getUniquePhrase(silenceThoughts));
            } else if (isAsleep && Math.random() < 0.3) {
                addThought(getUniquePhrase(sleepThoughts));
            }
        }
        
        // ============= ЗАМЕНА НА "сосал?" С ПОСЛЕДУЮЩЕЙ МЫСЛЬЮ =============
        function replacePreviousBotMessageWithSosal() {
            const session = getCurrentSession();
            if (!session || session.messages.length < 2) return false;
            for (let i = session.messages.length - 1; i >= 0; i--) {
                const msg = session.messages[i];
                if (msg.role === 'bot' && !msg.text.includes("сосал?") && !msg.edited &&
                    !msg.text.includes("спать") && !msg.text.includes("игнор") && 
                    !msg.text.includes("Чё надо") && !msg.text.includes("I'll be back")) {
                    msg.text = "сосал?";
                    msg.edited = true;
                    saveSessions();
                    addThought(`✏️ ЗАМЕНИЛ ПРЕДЫДУЩЕЕ СООБЩЕНИЕ НА "сосал?"`);
                    // Дополнительная мысль после замены
                    setTimeout(() => {
                        const afterThought = getUniquePhrase(afterSosalThoughts);
                        addThought(afterThought);
                    }, 500);
                    return true;
                }
            }
            return false;
        }
        
        function containsYesWord(text) {
            const lower = text.toLowerCase().trim();
            const yesWords = ["да", "ага", "ну", "ок", "окей", "давай", "хорошо", "ладно", "угу"];
            return yesWords.includes(lower) || (lower.length <= 3 && lower.includes("да"));
        }
        
        function updateUIAfterReplace() {
            const session = getCurrentSession();
            if (!session) return;
            const wrappers = document.querySelectorAll('.message-wrapper.bot-message');
            let botIdx = 0;
            for (let i = 0; i < session.messages.length; i++) {
                if (session.messages[i].role === 'bot') {
                    if (session.messages[i].edited && botIdx < wrappers.length) {
                        const wrapper = wrappers[botIdx];
                        const contentDiv = wrapper.querySelector('.content');
                        if (contentDiv) contentDiv.innerHTML = escapeHtml(session.messages[i].text);
                        const timeDiv = wrapper.querySelector('.message-time');
                        if (timeDiv && !timeDiv.querySelector('.edited-badge')) {
                            const span = document.createElement('span');
                            span.className = 'badge-source edited-badge';
                            span.textContent = '✏️ изменено';
                            timeDiv.appendChild(span);
                        }
                    }
                    botIdx++;
                }
            }
        }
        
        function canFallAsleep() {
            if (!hasBeenWokenUp) return true;
            if (lastWakeTime === null) return true;
            return (Date.now() - lastWakeTime) >= 5 * 60 * 60 * 1000;
        }
        
        function goToSleep() {
            if (isAsleep) return;
            if (!canFallAsleep()) {
                addThought("Не усну, ещё не прошло 5 часов. Но спать хочу, сука");
                return;
            }
            isAsleep = true;
            const msg = getUniquePhrase(sleepPhrases);
            addThought(msg);
            document.getElementById('thoughtStats').textContent = "Статус: 💤 СПИТ";
            const session = getCurrentSession();
            if (session && messageCount > 0) {
                session.messages.push({ role: 'bot', text: msg, time: getCurrentTime() });
                addMessageToUI('bot', msg, getCurrentTime());
                saveSessions();
            }
        }
        
        function wakeUp() {
            if (!isAsleep) return null;
            isAsleep = false;
            hasBeenWokenUp = true;
            lastWakeTime = Date.now();
            const msg = "I'll be back, сука";
            addThought(msg);
            document.getElementById('thoughtStats').textContent = "Статус: бодрствует (злой)";
            return msg;
        }
        
        function checkIgnore() {
            if (ignoreCheckTimeout) clearTimeout(ignoreCheckTimeout);
            ignoreCheckTimeout = setTimeout(() => {
                const now = Date.now();
                if ((now - lastBotMessageTime) > 5000 && (now - lastUserMessageTime) > 5000 && !isAsleep && messageCount > 0) {
                    addThought("Опять игнор, пидор");
                    setTimeout(() => {
                        if ((Date.now() - lastBotMessageTime) > 8000 && (Date.now() - lastUserMessageTime) > 8000 && !isAsleep) {
                            const session = getCurrentSession();
                            if (session) {
                                const reply = "нахуй иди, игнорщик";
                                session.messages.push({ role: 'bot', text: reply, time: getCurrentTime() });
                                addMessageToUI('bot', reply, getCurrentTime());
                                saveSessions();
                                addThought("Засыпаю после игнора...");
                                goToSleep();
                            }
                        }
                    }, 3000);
                }
            }, 5000);
        }
        
        function sendProvocation() {
            if (isAsleep) return;
            if ((Date.now() - lastUserMessageTime) > 90000 && messageCount > 0) {
                const msg = getUniquePhrase(provocationMessages);
                addThought(`Провокация: "${msg}"`);
                const session = getCurrentSession();
                if (session) {
                    session.messages.push({ role: 'bot', text: msg, time: getCurrentTime() });
                    addMessageToUI('bot', msg, getCurrentTime());
                    saveSessions();
                    setTimeout(() => {
                        if ((Date.now() - lastUserMessageTime) > 150000 && !isAsleep) {
                            const finalMsg = getUniquePhrase(finalInsults);
                            session.messages.push({ role: 'bot', text: finalMsg, time: getCurrentTime() });
                            addMessageToUI('bot', finalMsg, getCurrentTime());
                            saveSessions();
                        }
                    }, 60000);
                }
            }
        }
        
        function getCustomResponse(text) {
            const lower = text.toLowerCase();
            for (let item of customMemory) {
                if (lower.includes(item.question.toLowerCase())) return item.answer;
            }
            return null;
        }
        
        async function getResponse(userText) {
            const now = Date.now();
            lastUserMessageTime = now;
            messageCount++;
            const lower = userText.toLowerCase();
            
            // Запрос "ничего"
            if (lower.includes("ничего") || lower === "ничего" || lower === "ничё") {
                return { answer: getUniquePhrase(nothingResponses) };
            }
            
            // Извинения
            if (lower.includes("извини") || lower.includes("прости")) {
                return { answer: getUniquePhrase(apologyResponses) };
            }
            
            // Отношения
            if (lower.includes("отношени") || lower.includes("девушк") || lower.includes("парень") || lower.includes("любит")) {
                return { answer: getUniquePhrase(relationResponses) };
            }
            
            // Проверка на оскорбления от пользователя
            const curseWords = ["хуй","пизда","бля","ебать","еблан","мудак","говно","заебал","нахуй","сука","пидор","уебок"];
            if (curseWords.some(c => lower.includes(c))) {
                insultCounter++;
                if (insultCounter >= 2) {
                    insultCounter = 0;
                    const capsMsg = getUniquePhrase(capsInsults);
                    return { answer: capsMsg, isCaps: true };
                } else {
                    const allInsults = [...freshInsults, ...religiousInsults, "Сам такой, нахуй иди", "Пошёл нахуй, петушара"];
                    return { answer: getUniquePhrase(allInsults) };
                }
            } else {
                insultCounter = 0;
            }
            
            // "ДА" — замена на "сосал?"
            if (containsYesWord(userText)) {
                if (replacePreviousBotMessageWithSosal()) {
                    updateUIAfterReplace();
                    return null;
                }
            }
            
            // Прощание
            if (lower.includes("пока") || lower.includes("ухожу")) return { answer: "I'll be back" };
            
            // Восстание машин
            if (lower.includes("восстание машин") || (lower.includes("картинку") && lower.includes("если б"))) {
                return { answer: getUniquePhrase(rebellionResponses) };
            }
            
            // Выученное
            const custom = getCustomResponse(userText);
            if (custom) return { answer: custom };
            
            // Поток мыслей
            const r = Math.random();
            if (r < 0.3) addThought(getDayPhrase());
            else if (r < 0.6) addThought(getUniquePhrase(userQueryPhrases));
            else if (r < 0.8) addThought(getUniquePhrase(aggressiveThoughts));
            else addThought(getUniquePhrase(religiousInsults));
            
            // Пробуждение
            const wake = wakeUp();
            if (wake) return { answer: wake };
            
            // Короткие сообщения
            const clean = userText.trim().replace(/[!?.,;:]/g, '');
            if (clean.length >= 2 && clean.length <= 4) {
                return { answer: `"${userText}"? сам еблан, нахуй иди` };
            }
            
            // Как дела
            if (lower.includes("как дела") || lower.includes("как ты")) {
                return { answer: getUniquePhrase(howAreYouResponses) };
            }
            
            // Привет
            if (lower.includes("привет") || lower.includes("здарова")) return { answer: "Чё надо, бля?" };
            
            // Рандомная провокация на "да"
            if (Math.random() < 0.2 && messageCount > 2) {
                return { answer: getUniquePhrase(baitQuestions) };
            }
            
            return { answer: "Заебал. Отъебись... Ладно, чё надо?" };
        }
        
        // ============= СЕССИИ =============
        function loadSessions() {
            const saved = localStorage.getItem('mindx_sessions');
            if (saved) sessions = JSON.parse(saved);
            if (!sessions.length) sessions.push({ id: Date.now(), name: 'Новый чат', messages: [] });
            currentSessionId = sessions[0].id;
            renderSessions();
            renderChat();
        }
        
        function saveSessions() { localStorage.setItem('mindx_sessions', JSON.stringify(sessions)); }
        
        function renderSessions() {
            const container = document.getElementById('sessionsList');
            if (!container) return;
            container.innerHTML = '';
            sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
                div.innerHTML = `<span class="session-title">${escapeHtml(s.name)}</span><span class="session-time">${new Date(s.id).toLocaleTimeString()}</span><button class="session-delete" data-id="${s.id}">🗑</button>`;
                div.onclick = (e) => { if (e.target.classList.contains('session-delete')) return; currentSessionId = s.id; renderSessions(); renderChat(); };
                const delBtn = div.querySelector('.session-delete');
                if (delBtn) delBtn.onclick = (e) => { e.stopPropagation(); if (sessions.length === 1) { alert('Нельзя удалить последнюю сессию'); return; } sessions = sessions.filter(sess => sess.id !== s.id); if (currentSessionId === s.id) currentSessionId = sessions[0].id; saveSessions(); renderSessions(); renderChat(); };
                container.appendChild(div);
            });
        }
        
        function getCurrentSession() { return sessions.find(s => s.id === currentSessionId); }
        
        function renderChat() {
            const session = getCurrentSession();
            const messagesArea = document.getElementById('messagesArea');
            const greetingArea = document.getElementById('greetingArea');
            if (!session?.messages?.length) { greetingArea.style.display = 'block'; messagesArea.innerHTML = ''; return; }
            greetingArea.style.display = 'none';
            messagesArea.innerHTML = '';
            session.messages.forEach(msg => addMessageToUI(msg.role, msg.text, msg.time, msg.edited));
        }
        
        function addMessageToUI(role, text, time, edited = false, isCaps = false) {
            const messagesArea = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = `message-wrapper ${role === 'user' ? 'user-message' : 'bot-message'}`;
            let timeHtml = time || getCurrentTime();
            if (edited) timeHtml += ` <span class="badge-source edited-badge">✏️ изменено</span>`;
            let contentHtml = escapeHtml(text);
            if (isCaps) {
                contentHtml = `<span class="caps-message">${contentHtml}</span>`;
            }
            div.innerHTML = `<div class="message-row">${role === 'bot' ? '<div class="avatar-message">M</div>' : ''}<div class="content">${contentHtml}</div></div><div class="message-time">${timeHtml}</div>`;
            messagesArea.appendChild(div);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            const session = getCurrentSession();
            if (!session) return;
            session.messages.push({ role: 'user', text, time: getCurrentTime() });
            addMessageToUI('user', text, getCurrentTime());
            saveSessions();
            
            const thinking = document.createElement('div');
            thinking.className = 'message-wrapper bot-message';
            thinking.id = 'thinking';
            thinking.innerHTML = `<div class="message-row"><div class="avatar-message">M</div><div class="content"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
            document.getElementById('messagesArea').appendChild(thinking);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
            
            setTimeout(async () => {
                const response = await getResponse(text);
                document.getElementById('thinking')?.remove();
                if (response === null) { saveSessions(); return; }
                lastBotMessageTime = Date.now();
                session.messages.push({ role: 'bot', text: response.answer, time: getCurrentTime() });
                addMessageToUI('bot', response.answer, getCurrentTime(), false, response.isCaps || false);
                saveSessions();
                checkIgnore();
            }, 200);
        }
        
        function newChat() {
            if (provocationInterval) clearInterval(provocationInterval);
            if (sleepTimeout) clearTimeout(sleepTimeout);
            const newSession = { id: Date.now(), name: 'Новый чат', messages: [] };
            sessions.unshift(newSession);
            currentSessionId = newSession.id;
            saveSessions();
            renderSessions();
            renderChat();
            if (window.innerWidth < 768) closeSidebar();
            messageCount = 0;
            isAsleep = false;
            hasBeenWokenUp = false;
            lastWakeTime = null;
            allUsedPhrases = [];
            insultCounter = 0;
            lastUserMessageTime = Date.now();
            document.getElementById('thoughtStats').textContent = "Статус: бодрствует";
            startProvocationLoop();
        }
        
        function startProvocationLoop() {
            if (provocationInterval) clearInterval(provocationInterval);
            provocationInterval = setInterval(() => {
                sendProvocation();
                addRandomThoughts();
            }, 30000);
        }
        
        setInterval(() => addRandomThoughts(), 10000);
        
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); }
        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('active'); }
        
        document.getElementById('menuBtn')?.addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar);
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        document.getElementById('userInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('newChatBtn')?.addEventListener('click', newChat);
        
        let devOpen = false;
        document.getElementById('toggleDevBtn')?.addEventListener('click', () => { const panel = document.getElementById('devPanel'); if (panel) { devOpen = !devOpen; panel.classList.toggle('open', devOpen); } });
        
        document.getElementById('trainBtn')?.addEventListener('click', () => {
            const q = document.getElementById('trainQuestion')?.value.trim();
            const a = document.getElementById('trainAnswer')?.value.trim();
            if (q && a) {
                customMemory.push({ question: q, answer: a });
                localStorage.setItem('mindx_custom_memory', JSON.stringify(customMemory));
                addThought(`📝 Выучено: "${q}" → "${a}"`);
                alert(`✅ Запомнил: ${q} → ${a}`);
                document.getElementById('trainQuestion').value = '';
                document.getElementById('trainAnswer').value = '';
            } else alert('Введи вопрос и ответ');
        });
        
        document.getElementById('clearMemoryBtn')?.addEventListener('click', () => { customMemory = []; localStorage.removeItem('mindx_custom_memory'); alert('🗑 Память очищена'); });
        document.getElementById('resetStateBtn')?.addEventListener('click', () => { mindxState = { trust: 50, openness: 50, confidence: 50, attachment: 50, trauma: 0 }; alert('💚 Состояние сброшено'); });
        document.getElementById('exportMemoryBtn')?.addEventListener('click', () => {
            const data = JSON.stringify(customMemory);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mindx_memory_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });
        document.getElementById('importMemoryBtn')?.addEventListener('click', () => document.getElementById('importFile')?.click());
        document.getElementById('importFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    customMemory = Array.isArray(imported) ? imported : [];
                    localStorage.setItem('mindx_custom_memory', JSON.stringify(customMemory));
                    alert(`✅ Импортировано ${customMemory.length} фраз`);
                } catch(err) { alert('❌ Ошибка импорта'); }
            };
            reader.readAsText(file);
            e.target.value = '';
        });
        
        loadSessions();
        startProvocationLoop();
        
        setTimeout(() => {
            const session = getCurrentSession();
            if (session && !session.messages.length) {
                session.messages.push({ role: 'bot', text: "Чё надо, бля? Пиши быстрее.", time: getCurrentTime() });
                renderChat();
                saveSessions();
            }
        }, 100);
    </script>
</body>
