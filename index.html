<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealReel · Полная версия</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            padding: 0;
            margin: 0;
        }

        .phone-frame {
            width: 380px;
            height: 720px;
            background: #1a1a1a;
            border-radius: 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-surface: #2d2d2d;
            --bg-surface-hover: #3d3d3d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-primary: #5f9ea0;
            --accent-secondary: #7bb5b7;
            --border-color: #3a3a3a;
        }

        /* Верхняя навигация */
        .top-nav {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .top-nav.hidden {
            display: none;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            color: var(--accent-primary);
            letter-spacing: -0.5px;
            text-shadow: 0 0 10px rgba(95,158,160,0.3);
        }

        .version {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-left: 4px;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 20px;
        }

        .daily-feature {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-primary);
            background: rgba(95,158,160,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(95,158,160,0.2);
        }

        .daily-feature:hover {
            background: rgba(95,158,160,0.2);
            transform: scale(1.02);
        }

        .nav-icons {
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            color: var(--text-secondary);
            transition: 0.2s;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .nav-icon:hover {
            background: var(--accent-primary);
            color: white;
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: -3px;
            right: -3px;
            background: #FF6B6B;
            color: white;
            font-size: 9px;
            font-weight: 600;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            border: 2px solid var(--bg-primary);
        }

        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0;
            background: var(--bg-surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .bottom-nav.hidden {
            display: none;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
            flex: 1;
            color: var(--text-secondary);
            transition: 0.2s;
            position: relative;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .nav-item.active {
            color: var(--accent-primary);
        }

        .nav-item.active svg {
            filter: drop-shadow(0 2px 4px rgba(95,158,160,0.3));
        }

        .nav-item:hover {
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .nav-label {
            font-size: 10px;
            margin-top: 4px;
            font-weight: 500;
        }

        .nav-badge {
            position: absolute;
            top: -2px;
            right: 15px;
            background: #FF6B6B;
            color: white;
            font-size: 9px;
            font-weight: 600;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid var(--bg-primary);
        }

        /* Экран авторизации */
        .auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.pexels.com/photos/3155666/pexels-photo-3155666.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
            filter: brightness(0.6) blur(2px);
            animation: zoom 20s infinite alternate;
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .auth-form {
            width: 300px;
            padding: 35px 25px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            border: 1px solid var(--border-color);
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            color: var(--accent-primary);
            text-shadow: 0 0 10px rgba(95,158,160,0.3);
        }

        .auth-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: 40px;
            margin-bottom: 14px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .auth-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(95,158,160,0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            box-shadow: 0 10px 20px rgba(95,158,160,0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(95,158,160,0.4);
        }

        .auth-btn.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .auth-btn .btn-text {
            transition: 0.2s;
        }

        .auth-btn.loading .btn-text {
            opacity: 0;
        }

        .auth-btn .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .auth-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 13px;
        }

        .auth-link {
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-link:hover {
            color: var(--accent-primary);
        }

        .auth-error {
            color: #FF6B6B;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Загрузочный экран */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: 0.3s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-surface);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            z-index: 200;
            display: none;
            border: 1px solid var(--border-color);
        }

        .modal.active {
            display: block;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            margin-bottom: 15px;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-input:focus {
            border-color: var(--accent-primary);
        }

        .modal-file {
            padding: 14px;
            border: 2px dashed var(--accent-primary);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            color: var(--accent-secondary);
            font-weight: 500;
            transition: 0.2s;
        }

        .modal-file:hover {
            background: rgba(95,158,160,0.05);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .modal-btn:hover {
            background: #4d4d4d;
        }

        .modal-btn.save {
            background: var(--accent-primary);
            color: white;
        }

        .modal-btn.save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(95,158,160,0.3);
        }

        /* Passport STIQ */
        .passport-stiq {
            position: relative;
            margin: 10px 0;
            padding: 20px;
            background: linear-gradient(135deg, var(--accent-primary), #7bb5b7);
            border-radius: 20px;
            color: white;
            animation: passportAppear 0.5s ease-out, passportFloat 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(95,158,160,0.4);
            max-width: 90%;
            align-self: center;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        .passport-stiq.left {
            align-self: flex-start;
        }

        .passport-stiq.right {
            align-self: flex-end;
        }

        @keyframes passportAppear {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes passportFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .passport-icon {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            transform: rotate(5deg);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: passportIconSpin 10s linear infinite;
            border: 3px solid var(--accent-primary);
        }

        @keyframes passportIconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .passport-icon img {
            width: 40px;
            height: 40px;
            animation: passportIconPulse 2s ease-in-out infinite;
        }

        @keyframes passportIconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .passport-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            opacity: 0.9;
            text-transform: uppercase;
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 25px;
            display: inline-block;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { background: rgba(255,255,255,0.2); }
            50% { background: rgba(255,255,255,0.3); }
        }

        .passport-number {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .passport-place {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: placeGlow 3s ease-in-out infinite;
        }

        @keyframes placeGlow {
            0%, 100% { text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
            50% { text-shadow: 0 5px 20px rgba(255,255,255,0.5); }
        }

        .passport-message {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
            line-height: 1.5;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            border-left: 3px solid white;
        }

        .passport-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            opacity: 0.9;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 10px;
            text-transform: uppercase;
        }

        .passport-visa-type {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            animation: visaPulse 2s ease-in-out infinite;
        }

        @keyframes visaPulse {
            0%, 100% { background: rgba(255,255,255,0.2); }
            50% { background: rgba(255,255,255,0.3); }
        }

        .passport-country {
            font-size: 10px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Коллекция виз */
        .visa-collection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }

        .visa-item {
            background: linear-gradient(135deg, var(--accent-primary), #7bb5b7);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            animation: visaItemAppear 0.5s ease-out;
        }

        .visa-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(95,158,160,0.4);
        }

        @keyframes visaItemAppear {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .visa-item-icon {
            font-size: 24px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .visa-item-place {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .visa-item-date {
            font-size: 8px;
            opacity: 0.8;
        }

        /* STORIES */
        .stories-container {
            padding: 16px 12px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .stories {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .stories::-webkit-scrollbar {
            display: none;
        }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--accent-primary);
            position: relative;
        }

        .story-avatar.no-story {
            border-color: var(--border-color);
            opacity: 0.7;
        }

        .story-add {
            width: 70px;
            height: 70px;
            background: var(--bg-surface);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--accent-primary);
            border: 2px dashed var(--accent-primary);
        }

        .story-name {
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* REELS */
        .reels-container {
            height: calc(100vh - 220px);
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: var(--bg-primary);
        }

        .reel {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .reel video, .reel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
            color: white;
        }

        .reel-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reel-author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
        }

        .reel-actions {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .reel-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 12px;
        }

        .reel-action svg {
            width: 28px;
            height: 28px;
            stroke: white;
            fill: none;
            margin-bottom: 4px;
        }

        /* Профиль */
        .profile-screen {
            padding: 16px;
            height: 100%;
            overflow-y: auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--accent-primary);
            cursor: pointer;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .profile-nick {
            color: var(--accent-secondary);
            font-size: 14px;
        }

        .profile-bio {
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            color: var(--text-primary);
            position: relative;
        }

        .edit-bio-btn {
            position: absolute;
            right: 12px;
            top: 12px;
            width: 36px;
            height: 36px;
            background: var(--bg-surface-hover);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .profile-stat {
            text-align: center;
            cursor: pointer;
            flex: 1;
        }

        .profile-stat-value {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
        }

        .profile-stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .profile-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .profile-btn.primary {
            background: var(--accent-primary);
            color: white;
            border: none;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 16px;

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
            flex: 1;
            color: var(--text-secondary);
            transition: 0.2s;
            position: relative;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .nav-item.active {
            color: var(--accent-primary);
        }

        .nav-item.active svg {
            filter: drop-shadow(0 2px 4px rgba(95,158,160,0.3));
        }

        .nav-item:hover {
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .nav-label {
            font-size: 10px;
            margin-top: 4px;
            font-weight: 500;
        }

        .nav-badge {
            position: absolute;
            top: -2px;
            right: 15px;
            background: #FF6B6B;
            color: white;
            font-size: 9px;
            font-weight: 600;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid var(--bg-primary);
        }

        /* Экран авторизации */
        .auth-screen {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.pexels.com/photos/3155666/pexels-photo-3155666.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
            filter: brightness(0.6) blur(2px);
            animation: zoom 20s infinite alternate;
        }

        @keyframes zoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .auth-form {
            width: 300px;
            padding: 35px 25px;
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            border: 1px solid var(--border-color);
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            color: var(--accent-primary);
            text-shadow: 0 0 10px rgba(95,158,160,0.3);
        }

        .auth-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: 40px;
            margin-bottom: 14px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .auth-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(95,158,160,0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            box-shadow: 0 10px 20px rgba(95,158,160,0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(95,158,160,0.4);
        }

        .auth-btn.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .auth-btn .btn-text {
            transition: 0.2s;
        }

        .auth-btn.loading .btn-text {
            opacity: 0;
        }

        .auth-btn .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .auth-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 13px;
        }

        .auth-link {
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-link:hover {
            color: var(--accent-primary);
        }

        .auth-error {
            color: #FF6B6B;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Загрузочный экран */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: 0.3s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-surface);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            z-index: 200;
            display: none;
            border: 1px solid var(--border-color);
        }

        .modal.active {
            display: block;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            margin-bottom: 15px;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-input:focus {
            border-color: var(--accent-primary);
        }

        .modal-file {
            padding: 14px;
            border: 2px dashed var(--accent-primary);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            color: var(--accent-secondary);
            font-weight: 500;
            transition: 0.2s;
        }

        .modal-file:hover {
            background: rgba(95,158,160,0.05);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }

        .modal-btn:hover {
            background: #4d4d4d;
        }

        .modal-btn.save {
            background: var(--accent-primary);
            color: white;
        }

        .modal-btn.save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(95,158,160,0.3);
        }

        /* Passport STIQ */
        .passport-stiq {
            position: relative;
            margin: 10px 0;
            padding: 20px;
            background: linear-gradient(135deg, var(--accent-primary), #7bb5b7);
            border-radius: 20px;
            color: white;
            animation: passportAppear 0.5s ease-out, passportFloat 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(95,158,160,0.4);
            max-width: 90%;
            align-self: center;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        .passport-stiq.left {
            align-self: flex-start;
        }

        .passport-stiq.right {
            align-self: flex-end;
        }

        @keyframes passportAppear {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes passportFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .passport-icon {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            transform: rotate(5deg);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: passportIconSpin 10s linear infinite;
            border: 3px solid var(--accent-primary);
        }

        @keyframes passportIconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .passport-icon img {
            width: 40px;
            height: 40px;
            animation: passportIconPulse 2s ease-in-out infinite;
        }

        @keyframes passportIconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .passport-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            opacity: 0.9;
            text-transform: uppercase;
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 25px;
            display: inline-block;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { background: rgba(255,255,255,0.2); }
            50% { background: rgba(255,255,255,0.3); }
        }

        .passport-number {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .passport-place {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: placeGlow 3s ease-in-out infinite;
        }

        @keyframes placeGlow {
            0%, 100% { text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
            50% { text-shadow: 0 5px 20px rgba(255,255,255,0.5); }
        }

        .passport-message {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
            line-height: 1.5;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            border-left: 3px solid white;
        }

        .passport-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            opacity: 0.9;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 10px;
            text-transform: uppercase;
        }

        .passport-visa-type {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            animation: visaPulse 2s ease-in-out infinite;
        }

        @keyframes visaPulse {
            0%, 100% { background: rgba(255,255,255,0.2); }
            50% { background: rgba(255,255,255,0.3); }
        }

        .passport-country {
            font-size: 10px;
            opacity: 0.8;
            font-style: italic;
        }

        /* Коллекция виз */
        .visa-collection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }

        .visa-item {
            background: linear-gradient(135deg, var(--accent-primary), #7bb5b7);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            animation: visaItemAppear 0.5s ease-out;
        }

        .visa-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(95,158,160,0.4);
        }

        @keyframes visaItemAppear {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .visa-item-icon {
            font-size: 24px;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .visa-item-place {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .visa-item-date {
            font-size: 8px;
            opacity: 0.8;
        }

        /* STORIES */
        .stories-container {
            padding: 16px 12px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .stories {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .stories::-webkit-scrollbar {
            display: none;
        }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--accent-primary);
            position: relative;
        }

        .story-avatar.no-story {
            border-color: var(--border-color);
            opacity: 0.7;
        }

        .story-add {
            width: 70px;
            height: 70px;
            background: var(--bg-surface);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--accent-primary);
            border: 2px dashed var(--accent-primary);
        }

        .story-name {
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* REELS */
        .reels-container {
            height: calc(100vh - 220px);
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: var(--bg-primary);
        }

        .reel {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .reel video, .reel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
            color: white;
        }

        .reel-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .reel-author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
        }

        .reel-actions {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .reel-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 12px;
        }

        .reel-action svg {
            width: 28px;
            height: 28px;
            stroke: white;
            fill: none;
            margin-bottom: 4px;
        }

        /* Профиль */
        .profile-screen {
            padding: 16px;
            height: 100%;
            overflow-y: auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--accent-primary);
            cursor: pointer;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .profile-nick {
            color: var(--accent-secondary);
            font-size: 14px;
        }

        .profile-bio {
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 16px;
            margin: 16px 0;
            color: var(--text-primary);
            position: relative;
        }

        .edit-bio-btn {
            position: absolute;
            right: 12px;
            top: 12px;
            width: 36px;
            height: 36px;
            background: var(--bg-surface-hover);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .profile-stat {
            text-align: center;
            cursor: pointer;
            flex: 1;
        }

        .profile-stat-value {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
        }

        .profile-stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .profile-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .profile-btn.primary {
            background: var(--accent-primary);
            color: white;
            border: none;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 16px;
        }

        .post-thumb {
            aspect-ratio: 1;
            background: var(--bg-surface);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Аватарки */
        .avatar-default {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23cccccc"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: cover;
            background-position: center;
        }

        .avatar-1 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=cat1&backgroundColor=ffdfbf'); }
        .avatar-2 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=cat2&backgroundColor=c0a0d0'); }
        .avatar-3 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=cat3&backgroundColor=a0d0c0'); }
        .avatar-4 { background-image: url('https://api.dicebear.com/7.x/adventurer/svg?seed=cat4&backgroundColor=d0c0a0'); }

        .hidden {
            display: none !important;
        }

        .screen {
            display: none;
            height: 100%;
        }

        .screen.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
        </div>

        <div class="top-nav" id="topNav">
            <div class="logo-container">
                <div class="logo">RealReel</div>
                <div class="daily-feature" id="dailyFeature" onclick="changeDailyFeature()">67</div>
                <span class="version">v10.0</span>
            </div>
            <div class="nav-icons">
                <div class="nav-icon" onclick="openAddPostModal()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <div class="nav-icon" onclick="toggleNotifications()">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span class="badge" id="notificationBadge" style="display: none;">0</span>
                </div>
            </div>
        </div>

        <div class="modal" id="addPostModal">
            <div class="modal-title">Новый пост</div>
            <textarea class="modal-input" id="postText" placeholder="Что у вас нового?" rows="3"></textarea>
            <div class="modal-file" id="postFileInput">📸 Добавить фото</div>
            <input type="file" id="postFile" accept="image/*" style="display: none;">
            <div class="modal-actions">
                <button class="modal-btn save" id="publishPostBtn">Опубликовать</button>
                <button class="modal-btn cancel" id="cancelPostBtn">Отмена</button>
            </div>
        </div>

        <div class="modal" id="editProfileModal">
            <div class="modal-title">Редактировать профиль</div>
            <input type="text" class="modal-input" id="editFirstName" placeholder="Имя">
            <input type="text" class="modal-input" id="editLastName" placeholder="Фамилия">
            <input type="text" class="modal-input" id="editNickname" placeholder="Никнейм">
            <textarea class="modal-input" id="editBio" placeholder="О себе" rows="3"></textarea>
            <div class="modal-actions">
                <button class="modal-btn save" id="saveProfileBtn">Сохранить</button>
                <button class="modal-btn cancel" id="cancelEditBtn">Отмена</button>
            </div>
        </div>

        <div class="notifications-panel" id="notificationsPanel">
            <div class="notifications-header">Уведомления</div>
            <div class="notifications-list" id="notificationsList"></div>
        </div>

        <!-- Основной экран: Stories + Reels -->
        <div class="screen active" id="reelsScreen">
            <div class="stories-container">
                <div class="stories" id="stories"></div>
            </div>
            <div class="reels-container" id="reelsContainer"></div>
        </div>

        <!-- Профиль -->
        <div class="screen" id="profileScreen">
            <div class="profile-screen">
                <div class="profile-header">
                    <div class="profile-avatar avatar-default" id="profileAvatar" onclick="document.getElementById('avatarFile').click()"></div>
                    <input type="file" id="avatarFile" accept="image/*" style="display: none;">
                    <div class="profile-info">
