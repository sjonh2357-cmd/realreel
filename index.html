<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>RENITEA · создай свой момент</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
    }

    /* LOGIN */
    .login-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      z-index: 2000;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      margin: 16px;
      background: #1e1e2e;
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      border: 1px solid #2a2a3a;
    }

    .login-logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.16em;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login-subtitle {
      font-size: 14px;
      color: #aaa;
      margin: 8px 0 20px;
    }

    .login-tabs {
      display: flex;
      gap: 8px;
      background: #2a2a3a;
      padding: 4px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .login-tab {
      flex: 1;
      border: none;
      padding: 10px;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      font-weight: 500;
      color: #aaa;
    }

    .login-tab.active {
      background: #0f0f1a;
      color: white;
    }

    .login-input {
      width: 100%;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 14px;
      background: #2a2a3a;
      color: white;
    }

    .login-btn {
      width: 100%;
      border: none;
      border-radius: 40px;
      padding: 14px;
      background: #0f0f1a;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .login-error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 10px;
    }

    /* APP — аниме-градиентный фон */
    .app {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
    }

    .topbar {
      height: 60px;
      background: rgba(15, 15, 26, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #ff6cab, #ffdd59, #4cd964, #34aadc, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search {
      width: 260px;
      border-radius: 999px;
      border: none;
      padding: 10px 18px;
      background: rgba(42, 42, 58, 0.8);
      color: white;
    }

    .search::placeholder {
      color: #888;
    }

    .main-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* DESKTOP NAV */
    .right-nav {
      width: 80px;
      background: rgba(15, 15, 26, 0.9);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 20px;
    }

    .nav-item {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #aaa;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .nav-item svg {
      width: 28px;
      height: 28px;
    }

    .nav-item svg * {
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .nav-item.active svg * {
      fill: currentColor;
    }

    .nav-label {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    .nav-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .nav-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* FEED */
    .feed-composer {
      max-width: 600px;
      margin: 0 auto 20px;
      background: rgba(30, 30, 46, 0.95);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .feed-composer textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      resize: vertical;
      min-height: 70px;
      background: rgba(42, 42, 58, 0.8);
      color: white;
    }

    .feed-composer button {
      margin-top: 12px;
      float: right;
      border: none;
      border-radius: 999px;
      padding: 10px 24px;
      background: #0f0f1a;
      color: white;
      cursor: pointer;
    }

    .feed-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .feed-post {
      background: rgba(30, 30, 46, 0.95);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .post-author-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .post-avatar-small {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(42, 42, 58, 0.8);
      overflow: hidden;
    }

    .post-avatar-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-author-name {
      font-weight: 600;
      font-size: 14px;
      color: white;
    }

    .post-date {
      font-size: 11px;
      color: #aaa;
    }

    .feed-post-image {
      width: 100%;
      max-height: 500px;
      background: #000;
      overflow: hidden;
      cursor: zoom-in;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feed-post-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
      transition: transform 0.3s;
    }

    .feed-post-image.zoomed {
      cursor: zoom-out;
      overflow: auto;
    }

    .feed-post-image.zoomed img {
      transform: scale(2);
    }

    .feed-post-text {
      padding: 12px 16px;
      font-size: 14px;
      color: #ccc;
    }

    /* Иконки в ряд 🔥 💬 ✉️ */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 22px;
      transition: transform 0.15s;
      color: #aaa;
    }

    .action-btn:hover {
      transform: scale(1.08);
      color: white;
    }

    .action-count {
      font-size: 14px;
      font-weight: 500;
    }

    .delete-post-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #aaa;
      padding: 4px 8px;
    }

    .delete-post-btn:hover {
      color: #ff6b6b;
    }

    /* ПРОФИЛЬ */
    .profile-header {
      max-width: 760px;
      margin: 0 auto 24px;
      background: rgba(30, 30, 46, 0.95);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .profile-cover {
      height: 140px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: background 0.3s;
    }

    .profile-cover.pattern-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .profile-cover.pattern-2 { background: repeating-linear-gradient(45deg, #ff6cab, #ff6cab 20px, #ffdd59 20px, #ffdd59 40px); }
    .profile-cover.pattern-3 { background: radial-gradient(circle at 20% 40%, #4cd964, #34aadc); }
    .profile-cover.pattern-4 { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }

    .profile-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-top: -50px;
      margin-bottom: 12px;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #1e1e2e;
      background: #2a2a3a;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      text-align: center;
      padding: 0 20px 20px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      color: white;
    }

    .profile-username {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .profile-bio {
      font-size: 14px;
      margin: 12px auto;
      padding: 12px 20px;
      background: rgba(42, 42, 58, 0.8);
      border-radius: 20px;
      max-width: 80%;
      color: #ccc;
    }

    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 16px 0;
      color: white;
    }

    .profile-stats span b {
      font-size: 18px;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary, .btn-ghost {
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #0f0f1a;
      color: white;
    }

    .btn-ghost {
      background: rgba(42, 42, 58, 0.8);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 760px;
      margin: 0 auto;
    }

    .profile-grid-item {
      aspect-ratio: 1/1;
      background: rgba(42, 42, 58, 0.8);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .profile-grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* НАСТРОЙКИ */
    .settings-panel {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(30, 30, 46, 0.95);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-title {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
    }

    .pattern-option {
      display: inline-block;
      width: 60px;
      height: 60px;
      border-radius: 16px;
      margin: 8px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .pattern-option.selected {
      border-color: #ff6cab;
    }

    .settings-btn {
      width: 100%;
      padding: 14px;
      background: rgba(42, 42, 58, 0.8);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .settings-btn:hover {
      background: #ff6cab;
    }

    /* ЧАТЫ — тёмная тема в стиле аниме-градиента */
    .chats-layout {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 70vh;
      background: rgba(30, 30, 46, 0.95);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-list {
      background: rgba(15, 15, 26, 0.8);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .chat-item.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .chat-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(42, 42, 58, 0.8);
      overflow: hidden;
    }

    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      color: white;
      font-weight: 600;
    }

    .chat-last-message {
      font-size: 12px;
      color: #aaa;
    }

    .chat-dialog {
      display: flex;
      flex-direction: column;
    }

    .chat-dialog-header {
      padding: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 15, 26, 0.8);
      cursor: pointer;
      color: white;
    }

    .chat-dialog-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(30, 30, 46, 0.8);
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
    }

    .msg.me {
      margin-left: auto;
      background: rgba(42, 42, 58, 0.9);
      color: white;
    }

    .msg.them {
      background: rgba(15, 15, 26, 0.9);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-dialog-input {
      display: flex;
      gap: 12px;
      padding: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 15, 26, 0.8);
    }

    .chat-dialog-input input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      background: rgba(42, 42, 58, 0.8);
      color: white;
    }

    .chat-dialog-input button {
      border-radius: 999px;
      border: none;
      padding: 12px 24px;
      background: #0f0f1a;
      color: white;
      cursor: pointer;
    }

    /* СТИКИ */
    .stiki-composer {
      max-width: 520px;
      margin: 0 auto 16px;
      background: rgba(30, 30, 46, 0.95);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stiki-wrapper {
      max-width: 520px;
      margin: 0 auto;
      height: 70vh;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      border-radius: 20px;
    }

    .stiki-card {
      position: relative;
      height: 70vh;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
      scroll-snap-align: start;
    }

    .stiki-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stiki-reactions {
      position: absolute;
      bottom: 20px;
      left: 16px;
      display: flex;
      gap: 16px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 16px;
      border-radius: 999px;
    }

    .stiki-reaction {
      cursor: pointer;
      display: flex;
      gap: 6px;
      color: white;
    }

    /* ПАСПОРТ */
    .passport-layout {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .passport-card {
      background: rgba(30, 30, 46, 0.95);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .passport-photo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background: rgba(42, 42, 58, 0.8);
      background-size: cover;
    }

    .visa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .visa-card {
      background: rgba(30, 30, 46, 0.95);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* МОБИЛЬНАЯ НАВИГАЦИЯ */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(15, 15, 26, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      justify-content: space-around;
      align-items: center;
      z-index: 500;
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 60px;
      cursor: pointer;
      color: #aaa;
    }

    .mobile-nav-item.active {
      color: white;
    }

    .mobile-nav-item svg {
      width: 24px;
      height: 24px;
    }

    .mobile-nav-label {
      font-size: 10px;
      margin-top: 4px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      background: #1e1e2e;
      border-radius: 24px;
      padding: 24px;
      max-width: 420px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .modal input, .modal textarea {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      background: rgba(42, 42, 58, 0.8);
      color: white;
    }

    @media (max-width: 720px) {
      .right-nav { display: none; }
      .mobile-nav { display: flex; }
      .content { padding-bottom: 90px; }
      .chats-layout { grid-template-columns: 1fr; height: 60vh; }
      .passport-layout { grid-template-columns: 1fr; }
      .feed-post-image.zoomed img { transform: scale(1.5); }
    }

    .empty-feed-text, .recommendations-title {
      text-align: center;
      padding: 40px;
      color: #aaa;
    }

    .recommendations-list {
      max-width: 600px;
      margin: 0 auto;
    }

    .rec-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: rgba(30, 30, 46, 0.95);
      border-radius: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
    }

    .rec-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(42, 42, 58, 0.8);
      overflow: hidden;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrapper" id="loginWrapper">
  <div class="login-card">
    <div class="login-logo">RENITEA</div>
    <div class="login-subtitle">создай свой момент</div>
    <div class="login-tabs">
      <button class="login-tab active" data-tab="login">Войти</button>
      <button class="login-tab" data-tab="register">Создать</button>
    </div>
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPass" placeholder="Пароль">
      <button class="login-btn" id="loginBtn">Войти</button>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regName" placeholder="Имя">
      <input type="text" id="regNick" placeholder="Никнейм">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPass" placeholder="Пароль">
      <input type="password" id="regPass2" placeholder="Повтор">
      <div><label>Аватар:</label><input type="file" id="regAvatar" accept="image/*"></div>
      <button class="login-btn" id="registerBtn">Создать</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appRoot">
  <header class="topbar">
    <div class="brand">RENITEA</div>
    <input class="search" id="userSearch" placeholder="Поиск...">
  </header>
  <div class="main-row">
    <main class="content">
      <section class="screen active" id="screen-posts">
        <div class="feed-composer">
          <textarea id="feedText" placeholder="Что нового?"></textarea>
          <input type="file" id="feedImage" accept="image/*">
          <button id="feedPublishBtn">Опубликовать</button>
        </div>

  async function compressImage(file, maxWidth = 1080, quality = 0.8, maxHeight = null) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          if (maxWidth && width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          if (maxHeight && height > maxHeight) {
            width = (width * maxHeight) / height;
            height = maxHeight;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function imageToBase64(blob) {

  async function toggleFollow(targetUserId) {
    if (!state.currentUser) return;
    const currentUserId = state.currentUser.uid;
    const userRef = db.collection('users').doc(currentUserId);
    const targetRef = db.collection('users').doc(targetUserId);
    
    const isFollowing = state.subscriptions[targetUserId];
    
    if (isFollowing) {
      await userRef.update({
        following: firebase.firestore.FieldValue.arrayRemove(targetUserId)
      });
      await targetRef.update({
        followers: firebase.firestore.FieldValue.arrayRemove(currentUserId)
      });
      state.subscriptions[targetUserId] = false;
    } else {
      await userRef.update({
        following: firebase.firestore.FieldValue.arrayUnion(targetUserId)
      });
      await targetRef.update({
        followers: firebase.firestore.FieldValue.arrayUnion(currentUserId)
      });
      state.subscriptions[targetUserId] = true;
    }
    renderProfile();
  }

    if (passportNick) passportNick.textContent = user.nick || '—';
    if (passportPersona) passportPersona.textContent = user.persona || '—';
    
    const isOwn = (uid === state.currentUser.uid);
    
    if (profileActions) {
      profileActions.innerHTML = '';
      if (isOwn) {
        profileActions.innerHTML = `<button class="btn-primary" id="editProfileBtn">Редактировать</button><button class="btn-ghost" id="logoutBtn">Выйти</button>`;
        document.getElementById('editProfileBtn')?.addEventListener('click', openEditProfileModal);
        document.getElementById('logoutBtn')?.addEventListener('click', () => auth.signOut());
      } else {
        const isFollowing = (user.followers || []).includes(state.currentUser.uid);
        profileActions.innerHTML = `<button class="btn-primary" id="followBtn">${isFollowing ? 'Отписаться' : 'Подписаться'}</button><button class="btn-ghost" id="messageFromProfileBtn">Написать</button>`;
        document.getElementById('followBtn')?.addEventListener('click', () => toggleFollow(uid));
        document.getElementById('messageFromProfileBtn')?.addEventListener('click', () => {
          currentChatUserId = uid;
          showScreen('chats');
          listenMessagesForChat(state.currentUser.uid, uid);
          renderChatList('');
        });
      }
    }
  }

  function openEditProfileModal() {
    if (!state.currentUser) return;
    const user = getUserFromCache(state.currentUser.uid);
    if (!user) return;
    if (editProfileNameInput) editProfileNameInput.value = user.name || '';
    if (editProfileNickInput) editProfileNickInput.value = user.nick || '';
    if (editProfilePersonaInput) editProfilePersonaInput.value = user.persona || '';
    if (editProfileBioInput) editProfileBioInput.value = user.bio || '';
    if (editProfileAvatarInput) editProfileAvatarInput.value = '';
    if (editProfileModal) editProfileModal.classList.add('active');
  }

  function renderProfileGrid() {
    if (!profileGrid || !state.currentUser) return;
    const uid = state.viewProfileUserId || state.currentUser.uid;
    profileGrid.innerHTML = '';
    const userPosts = state.posts.filter(p => p.authorId === uid);
    userPosts.forEach(p => {
      const div = document.createElement('div');
      div.className = 'profile-grid-item';
      if (p.imageBase64) {
        div.innerHTML = `<img src="${p.imageBase64}">`;
      } else {
        div.style.background = '#2a2a3a';
        div.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;">📷</div>';
      }
      profileGrid.appendChild(div);
    });
    if (userPosts.length === 0) {
      profileGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa;">Нет постов</div>';
    }
  }

  function renderPassport() {
    if (!state.currentUser) return;
    const user = getUserFromCache(state.currentUser.uid);
    if (!user) return;
    if (passportName) passportName.textContent = user.name || '—';
    if (passportNick) passportNick.textContent = user.nick || '—';
    if (passportPersona) passportPersona.textContent = user.persona || '—';
    if (passportPhoto) {
      passportPhoto.style.backgroundImage = user.avatarBase64 ? `url('${user.avatarBase64}')` : '';
      passportPhoto.style.backgroundSize = 'cover';
    }
    if (visaGrid && visaGrid.innerHTML === '') {
      visaGrid.innerHTML = `
        <div class="visa-card"><strong>🌟 Виза творчества</strong><br><small>Активна</small></div>
        <div class="visa-card"><strong>🌍 Виза путешествий</strong><br><small>12 стран</small></div>
        <div class="visa-card"><strong>🎵 Виза музыки</strong><br><small>50 треков</small></div>
      `;
    }
  }

  async function renderChatList(filter = '') {
    if (!chatList || !state.currentUser) return;
    const currentId = state.currentUser.uid;
    chatList.innerHTML = '';
    
    const chatsSnapshot = await db.collectionGroup('messages').get();
    const chatIds = new Set();
    chatsSnapshot.forEach(doc => {
      const path = doc.ref.path;
      const match = path.match(/chats\/(.+)\/messages/);
      if (match) {
        const key = match[1];
        const users = key.split('__');
        if (users[0] === currentId) chatIds.add(users[1]);
        if (users[1] === currentId) chatIds.add(users[0]);
      }
    });
    
    const q = filter.toLowerCase().trim();
    let users = Object.values(state.usersCache).filter(u => u.id !== currentId && chatIds.has(u.id));
    
    if (q) {
      users = users.filter(u => (u.name || '').toLowerCase().includes(q) || (u.nick || '').toLowerCase().includes(q));
    }
    
    if (!users.length) {
      chatList.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;">Нет активных чатов</div>';
      return;
    }
    
    for (const u of users) {
      const key = chatKey(currentId, u.id);
      const msgs = state.messages[key] || [];
      const last = msgs[msgs.length - 1];
      const item = document.createElement('div');
      item.className = 'chat-item' + (u.id === currentChatUserId ? ' active' : '');
      item.innerHTML = `
        <div class="chat-avatar">${u.avatarBase64 ? `<img src="${u.avatarBase64}">` : ''}</div>
        <div class="chat-info">
          <div class="chat-name">${escapeHtml(u.name || u.email)}</div>
          <div class="chat-last-message">${last ? escapeHtml(last.text.substring(0, 35)) : (u.nick || 'Нет сообщений')}</div>
        </div>
      `;
      item.addEventListener('click', () => {
        currentChatUserId = u.id;
        renderChatList(filter);
        listenMessagesForChat(currentId, currentChatUserId);
      });
      chatList.appendChild(item);
    }
    
    if (!currentChatUserId && users.length) {
      currentChatUserId = users[0].id;
      listenMessagesForChat(currentId, currentChatUserId);
    }
  }

  function renderChatDialog() {
    if (!chatDialogBody || !state.currentUser || !currentChatUserId) return;
    const currentId = state.currentUser.uid;
    const other = getUserFromCache(currentChatUserId);
    if (!other) return;
    
    if (chatDialogName) chatDialogName.textContent = other.name || other.email;
    if (chatDialogNick) chatDialogNick.textContent = other.nick || '';
    
    chatDialogBody.innerHTML = '';
    const key = chatKey(currentId, other.id);
    const msgs = state.messages[key] || [];
    msgs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.fromId === currentId ? 'me' : 'them');
      div.innerHTML = `<div>${escapeHtml(m.text)}</div><div class="msg-time">${m.time || ''}</div>`;
      chatDialogBody.appendChild(div);
    });
    chatDialogBody.scrollTop = chatDialogBody.scrollHeight;
  }

  function renderRecommendations() {
    if (!recommendationsList || !state.currentUser) return;
    const currentId = state.currentUser.uid;
    recommendationsList.innerHTML = '';
    
    Object.values(state.usersCache)
      .filter(u => u.id !== currentId)
      .slice(0, 5)
      .forEach(u => {
        const card = document.createElement('div');
        card.className = 'rec-card';
        card.innerHTML = `
          <div class="rec-avatar">${u.avatarBase64 ? `<img src="${u.avatarBase64}">` : ''}</div>
          <div><strong style="color:white;">${escapeHtml(u.name || u.email)}</strong><br><small style="color:#aaa;">${u.nick || ''}</small></div>
        `;
        card.addEventListener('click', () => {
          state.viewProfileUserId = u.id;
          renderProfile();
          renderProfileGrid();
          showScreen('profile');
        });
        recommendationsList.appendChild(card);
      });
  }

  // ========== FIREBASE LISTENERS ==========
  function listenUsers() {
    if (unsubscribeUsers) unsubscribeUsers();
    unsubscribeUsers = db.collection('users').onSnapshot(snap => {
      snap.docs.forEach(doc => {
        state.usersCache[doc.id] = { id: doc.id, ...doc.data() };
        if (state.currentUser && doc.id === state.currentUser.uid) {
          state.subscriptions = {};
          (doc.data().following || []).forEach(fid => { state.subscriptions[fid] = true; });
        }
      });
      renderProfile();
      renderChatList(userSearch?.value || '');
      renderRecommendations();
      renderFeed();
    });
  }

  function listenPosts() {
    if (unsubscribePosts) unsubscribePosts();
    unsubscribePosts = db.collection('posts').orderBy('createdAt', 'desc').onSnapshot(snap => {
      state.posts = snap.docs.map(doc => {
        const data = doc.data();
        return {
          id: doc.id,
          authorId: data.authorId,
          text: data.text || '',
          imageBase64: data.imageBase64 || '',
          createdAt: data.createdAt,
          time: data.createdAt ? formatTime(data.createdAt) : ''
        };
      });
      renderFeed();
      renderProfileGrid();
      renderPassport();
    });
  }

  function listenStiki() {
    if (unsubscribeStiki) unsubscribeStiki();
    unsubscribeStiki = db.collection('stiki').orderBy('createdAt', 'desc').onSnapshot(snap => {
      state.stiki = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderStiki();
    });
  }

  function listenMessagesForChat(currentId, otherId) {
    const key = chatKey(currentId, otherId);
    if (unsubscribeMessages) unsubscribeMessages();
    unsubscribeMessages = db.collection('chats').doc(key).collection('messages').orderBy('createdAt', 'asc').onSnapshot(snap => {
      state.messages[key] = snap.docs.map(doc => {
        const data = doc.data();
        return {
          fromId: data.fromId,
          text: data.text,
          time: data.createdAt ? formatTime(data.createdAt) : ''
        };
      });
      renderChatList(userSearch?.value || '');
      renderChatDialog();
    });
  }

  // ========== AUTH ==========
  async function afterLogin(user) {
    state.currentUser = user;
    state.viewProfileUserId = user.uid;
    await ensureUserDoc(user);
    loginWrapper.style.display = 'none';
    appRoot.style.display = 'flex';
    loadHeaderPattern();
    listenUsers();
    listenPosts();
    listenStiki();
    currentChatUserId = null;
    renderChatList('');
    renderRecommendations();
    showScreen('posts');
    
    if (patternSelector) {
      const currentPattern = loadHeaderPattern();
      document.querySelectorAll('.pattern-option').forEach(opt => {
        opt.classList.remove('selected');
        if (opt.dataset.pattern === currentPattern) opt.classList.add('selected');
        opt.addEventListener('click', () => {
          const pattern = opt.dataset.pattern;
          saveHeaderPattern(pattern);
          document.querySelectorAll('.pattern-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
        });
      });
    }
  }

  function unsubscribeAll() {
    if (unsubscribePosts) unsubscribePosts();
    if (unsubscribeStiki) unsubscribeStiki();
    if (unsubscribeMessages) unsubscribeMessages();
    if (unsubscribeUsers) unsubscribeUsers();
  }
    // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
  
  // Переключение вкладок логина
  if (loginTabs) {
    loginTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        loginTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        if (target === 'login') {
          if (loginForm) loginForm.style.display = 'flex';
          if (registerForm) registerForm.style.display = 'none';
        } else {
          if (loginForm) loginForm.style.display = 'none';
          if (registerForm) registerForm.style.display = 'flex';
        }
        if (loginError) loginError.textContent = '';
      });
    });
  }

  // Вход
  if (loginBtn) {
    loginBtn.addEventListener('click', async () => {
      if (loginError) loginError.textContent = '';
      const email = (loginEmail?.value || '').trim();
      const pass = loginPass?.value || '';
      
      if (!email || !pass) {
        if (loginError) loginError.textContent = 'Заполните email и пароль';
        return;
      }
      
      try {
        const cred = await auth.signInWithEmailAndPassword(email, pass);
        await afterLogin(cred.user);
      } catch (e) {
        if (loginError) loginError.textContent = e.message || 'Ошибка входа';
      }
    });
  }

  // Регистрация
  if (registerBtn) {
    registerBtn.addEventListener('click', async () => {
      if (loginError) loginError.textContent = '';
      const name = (regName?.value || '').trim();
      const nick = (regNick?.value || '').trim();
      const email = (regEmail?.value || '').trim();
      const pass = regPass?.value || '';
      const pass2 = regPass2?.value || '';
      const avatarFile = regAvatar?.files[0] || null;
      
      if (!name || !nick || !email || !pass || !pass2) {
        if (loginError) loginError.textContent = 'Заполните все поля';
        return;
      }
      if (pass !== pass2) {
        if (loginError) loginError.textContent = 'Пароли не совпадают';
        return;
      }
      if (pass.length < 6) {
        if (loginError) loginError.textContent = 'Пароль должен быть не менее 6 символов';
        return;
      }
      
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const user = cred.user;
        
        let avatarBase64 = '';
        if (avatarFile) {
          try {
            const compressed = await compressImage(avatarFile, 200, 0.7, 200);
            avatarBase64 = await imageToBase64(compressed);
          } catch (err) {
            console.warn('Ошибка сжатия аватара', err);
          }
        }
        
        await user.updateProfile({
          displayName: name,
          photoURL: avatarBase64 || null
        });
        
        await db.collection('users').doc(user.uid).set({
          email, name, nick, avatarBase64, bio: '', persona: '',
          followers: [],
          following: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        await afterLogin(user);
      } catch (e) {
        if (loginError) loginError.textContent = e.message || 'Ошибка регистрации';
      }
    });
  }

  // Enter для входа/регистрации
  if (loginPass) {
    loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn?.click(); });
  }
  if (regPass2) {
    regPass2.addEventListener('keydown', (e) => { if (e.key === 'Enter') registerBtn?.click(); });
  }

  // Публикация поста
  if (feedPublishBtn) {
    feedPublishBtn.addEventListener('click', async () => {
      if (!state.currentUser) return;
      const text = (feedText?.value || '').trim();
      const file = feedImage?.files[0];
      
      if (!text || !file) {
        alert('Нужен текст и фото');
        return;
      }
      
      try {
        const compressed = await compressImage(file, 1080, 0.8);
        const imageBase64 = await imageToBase64(compressed);
        await db.collection('posts').add({
          authorId: state.currentUser.uid,
          text,
          imageBase64,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (feedText) feedText.value = '';
        if (feedImage) feedImage.value = '';
      } catch (e) {
        alert('Ошибка публикации: ' + e.message);
      }
    });
  }

  // Публикация стика
  if (stikiPublishBtn) {
    stikiPublishBtn.addEventListener('click', async () => {
      if (!state.currentUser) return;
      const file = stikiInput?.files[0];
      if (!file) {
        alert('Выберите видео');
        return;
      }
      if (file.size > 15 * 1024 * 1024) {
        alert('Видео не более 15 МБ');
        return;
      }
      
      try {
        const ref = storage.ref().child(`stiki/${state.currentUser.uid}/${Date.now()}-${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        await db.collection('stiki').add({
          authorId: state.currentUser.uid,
          videoURL: url,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (stikiInput) stikiInput.value = '';
      } catch (e) {
        alert('Ошибка загрузки стика: ' + e.message);
      }
    });
  }

  // Отправка сообщения
  if (chatSendBtn) {
    chatSendBtn.addEventListener('click', async () => {
      const text = chatInput?.value.trim();
      if (!text || !state.currentUser || !currentChatUserId) return;
      
      const key = chatKey(state.currentUser.uid, currentChatUserId);
      const chatRef = db.collection('chats').doc(key);
      
      try {
        await chatRef.set({
          user1: state.currentUser.uid,
          user2: currentChatUserId,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        
        await chatRef.collection('messages').add({
          fromId: state.currentUser.uid,
          toId: currentChatUserId,
          text,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        if (chatInput) chatInput.value = '';
        renderChatList(userSearch?.value || '');
      } catch (e) {
        console.error('Ошибка отправки сообщения', e);
      }
    });
  }

  // Enter для отправки сообщения
  if (chatInput) {
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        chatSendBtn?.click();
      }
    });
  }

  // Поиск
  if (userSearch) {
    userSearch.addEventListener('input', () => {
      renderChatList(userSearch.value);
      renderRecommendations();
    });
  }

  // Навигация
  if (navItems) {
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const screen = item.dataset.screen;
        if (!screen) return;
        if (screen === 'profile') {
          state.viewProfileUserId = state.currentUser ? state.currentUser.uid : null;
          renderProfile();
          renderProfileGrid();
        }
        showScreen(screen);
      });
    });
  }

  // Закрытие модалки
  if (editProfileClose) {
    editProfileClose.addEventListener('click', () => {
      if (editProfileModal) editProfileModal.classList.remove('active');
    });
  }
  if (editProfileCancel) {
    editProfileCancel.addEventListener('click', () => {
      if (editProfileModal) editProfileModal.classList.remove('active');
    });
  }
  if (editProfileModal) {
    editProfileModal.addEventListener('click', (e) => {
      if (e.target === editProfileModal) editProfileModal.classList.remove('active');
    });
  }

  // Сохранение профиля
  if (editProfileSave) {
    editProfileSave.addEventListener('click', async () => {
      if (!state.currentUser) return;
      const uid = state.currentUser.uid;
      const ref = db.collection('users').doc(uid);
      const file = editProfileAvatarInput?.files[0];
      
      try {
        const updateData = {
          name: editProfileNameInput?.value.trim() || '',
          nick: editProfileNickInput?.value.trim() || '',
          persona: editProfilePersonaInput?.value.trim() || '',
          bio: editProfileBioInput?.value.trim() || ''
        };
        
        if (file) {
          try {
            const compressed = await compressImage(file, 200, 0.7, 200);
            updateData.avatarBase64 = await imageToBase64(compressed);
            await auth.currentUser.updateProfile({
              photoURL: updateData.avatarBase64,
              displayName: updateData.name
            });
          } catch (err) {
            console.warn('Ошибка сжатия аватара', err);
          }
        } else {
          await auth.currentUser.updateProfile({ displayName: updateData.name });
        }
        
        await ref.update(updateData);
        if (editProfileModal) editProfileModal.classList.remove('active');
        
        state.usersCache[uid] = { ...state.usersCache[uid], ...updateData };
        renderProfile();
        renderPassport();
        renderFeed();
      } catch (e) {
        alert('Ошибка сохранения: ' + e.message);
      }
    });
  }

  // Выход из настроек
  if (logoutSettingsBtn) {
    logoutSettingsBtn.addEventListener('click', async () => {
      await auth.signOut();
    });
  }

  // Открыть профиль из чата
  if (chatHeaderProfile) {
    chatHeaderProfile.addEventListener('click', () => {
      if (!currentChatUserId) return;
      state.viewProfileUserId = currentChatUserId;
      renderProfile();
      renderProfileGrid();
      showScreen('profile');
    });
  }

  // ========== АВТОРИЗАЦИЯ ==========
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      await afterLogin(user);
    } else {
      state.currentUser = null;
      state.viewProfileUserId = null;
      currentChatUserId = null;
      state.usersCache = {};
      state.posts = [];
      state.stiki = [];
      state.messages = {};
      if (loginWrapper) loginWrapper.style.display = 'flex';
      if (appRoot) appRoot.style.display = 'none';
      unsubscribeAll();
    }
  });

  console.log('RENITEA — полностью загружено. Аниме-градиентный фон, тёмные чаты, 🔥 💬 ✉️, подписки, настройки хедера.');
</script>
</body>
</html>
