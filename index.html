<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MindX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f7f7f8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        
        /* Боковая панель */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #f5f5f5;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar.open {
            left: 0;
        }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
            backdrop-filter: blur(2px);
        }
        
        .sidebar-overlay.active {
            display: block;
        }
        
        .sidebar-header { padding: 16px; border-bottom: 1px solid #e5e5e5; }
        .new-chat-btn {
            width: 100%;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #e8e8e8; }
        .sessions-list { flex: 1; overflow-y: auto; padding: 12px; }
        .session-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: 0.2s;
        }
        .session-item:hover { background: #e8e8e8; }
        .session-item.active { background: #e0e0e0; }
        .session-title {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-time {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
        }
        .session-delete {
            float: right;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #999;
            opacity: 0;
            transition: 0.2s;
        }
        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { color: #e5484d; }
        
        /* Основная область */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }
        .chat-header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 12px 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            padding: 0;
        }
        .menu-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: #1a1a1a;
            border-radius: 2px;
            transition: 0.2s;
        }
        
        .logo-area h1 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        /* Эффект переливания */
        .siri-gradient {
            height: 3px;
            background: linear-gradient(90deg, 
                #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000);
            background-size: 200% 100%;
            animation: siriWave 3s ease infinite;
            border-radius: 2px;
        }
        
        @keyframes siriWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            background: #f7f7f8;
            -webkit-overflow-scrolling: touch;
        }
        .messages-area {
            max-width: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-wrapper { display: flex; flex-direction: column; }
        .user-message { align-items: flex-end; }
        .bot-message { align-items: flex-start; }
        .message-row { display: flex; gap: 12px; max-width: 100%; }
        .avatar-message {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        .content {
            flex: 1;
            color: #1a1a1a;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message-time {
            font-size: 10px;
            color: #8e8ea0;
            margin-top: 4px;
            margin-left: 40px;
        }
        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .typing-indicator span {
            width: 8px; height: 8px; background: #8e8ea0; border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        @keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
        
        .input-area {
            background: #fff;
            border-top: 1px solid #e5e5e5;
            padding: 12px 16px;
            flex-shrink: 0;
        }
        .input-container {
            position: relative;
        }
        .input-container input {
            width: 100%;
            background: #f5f5f5;
            border: none;
            border-radius: 24px;
            padding: 12px 48px 12px 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            outline: none;
        }
        .input-container input:focus { background: #e8e8e8; }
        .input-container input::placeholder { color: #8e8ea0; }
        .input-container button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-icon {
            width: 20px;
            height: 20px;
            color: #1a1a1a;
            opacity: 0.6;
        }
        .input-container button:hover .send-icon { opacity: 1; }
        
        .greeting-area {
            padding: 40px 16px;
            text-align: center;
        }
        .greeting-title {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 24px;
        }
        .greeting-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .greeting-btn {
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 28px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .greeting-btn:hover { background: #e8e8e8; }
        
        /* Планшеты и выше */
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                left: 0;
                width: 260px;
                box-shadow: none;
            }
            .sidebar-overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
            .logo-area h1 {
                font-size: 20px;
            }
            .messages-area {
                max-width: 800px;
                margin: 0 auto;
            }
        }
        
        /* Мобильные */
        @media (max-width: 767px) {
            .chat-header {
                padding: 10px 16px;
            }
            .greeting-title {
                font-size: 24px;
            }
            .greeting-buttons {
                gap: 8px;
            }
            .greeting-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn"><span>+</span> Новый чат</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>

    <div class="main-area">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="logo-area">
                <h1>MindX</h1>
            </div>
        </div>
        <div class="siri-gradient"></div>
        <div class="chat-container" id="chatContainer">
            <div class="greeting-area" id="greetingArea">
                <div class="greeting-title">Я-MindX</div>
                <div class="greeting-buttons">
                    <button class="greeting-btn" data-question="Спроси меня">Спроси меня</button>
                    <button class="greeting-btn" data-question="Помоги решить">Помоги решить</button>
                    <button class="greeting-btn" data-question="Что нового?">Что нового?</button>
                    <button class="greeting-btn" data-question="Запланируй">Запланируй</button>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Спроси что угодно..." autocomplete="off">
                <button id="sendBtn">
                    <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===============================================================
        // MINDX — Мобильная версия с гамбургер-меню
        // ===============================================================
        
        // Мобильное меню
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }
        
        menuBtn.addEventListener('click', openSidebar);
        overlay.addEventListener('click', closeSidebar);
        
        // Закрываем при клике на ссылку внутри
        document.querySelectorAll('.session-item, .new-chat-btn').forEach(el => {
            el.addEventListener('click', () => {
                if (window.innerWidth < 768) closeSidebar();
            });
        });
        
        // ========== ОСТАЛЬНАЯ ЛОГИКА ==========
        const GROQ_API_KEY = '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';
        const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
        
        let sessions = [];
        let currentSessionId = null;
        let waitingForTestTopic = false;
        
        // Напоминания
        let reminders = [];
        
        function loadReminders() {
            const saved = localStorage.getItem('mindx_reminders');
            if (saved) reminders = JSON.parse(saved);
            startReminderChecker();
        }
        
        function saveReminders() {
            localStorage.setItem('mindx_reminders', JSON.stringify(reminders));
        }
        
        function addReminder(text, dateTime) {
            const reminder = {
                id: Date.now(),
                text: text,
                dateTime: dateTime.toISOString(),
                createdAt: new Date().toISOString(),
                warned: false
            };
            reminders.push(reminder);
            saveReminders();
            return reminder;
        }
        
        function getUpcomingReminders() {
            const now = new Date();
            return reminders.filter(r => new Date(r.dateTime) > now).sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
        }
        
        function checkReminders() {
            const now = new Date();
            for (let r of reminders) {
                const remindTime = new Date(r.dateTime);
                const diffSeconds = (remindTime - now) / 1000;
                
                if (diffSeconds <= 65 && diffSeconds > 55 && !r.warned) {
                    r.warned = true;
                    const session = getCurrentSession();
                    if (session) {
                        const botTime = getCurrentTime();
                        session.messages.push({ 
                            role: 'bot', 
                            text: `⏰ **Предупреждение!** Через 1 минуту: **${r.text}**`,
                            time: botTime 
                        });
                        addMessageToUI('bot', session.messages[session.messages.length - 1].text, botTime);
                        saveSessions();
                    }
                    saveReminders();
                }
                
                if (diffSeconds <= 2 && diffSeconds > -5 && !r.notified) {
                    r.notified = true;
                    const session = getCurrentSession();
                    if (session) {
                        const botTime = getCurrentTime();
                        session.messages.push({ 
                            role: 'bot', 
                            text: `🔔 **Напоминание:** ${r.text} ⏰\n\n_Время выполнить задачу._`,
                            time: botTime 
                        });
                        addMessageToUI('bot', session.messages[session.messages.length - 1].text, botTime);
                        saveSessions();
                    }
                    saveReminders();
                }
            }
        }
        
        function startReminderChecker() {
            setInterval(checkReminders, 3000);
        }
        
        function parseDateTime(text) {
            const lower = text.toLowerCase();
            const now = new Date();
            
            let match = lower.match(/через\s+(\d+)\s*(минут|минуту|мин|секунд|сек|час|часа|часов)/);
            if (match) {
                const amount = parseInt(match[1]);
                const unit = match[2];
                const date = new Date(now);
                if (unit.startsWith('минут') || unit === 'мин' || unit === 'минуту') {
                    date.setMinutes(date.getMinutes() + amount);
                } else if (unit.startsWith('секунд') || unit === 'сек') {
                    date.setSeconds(date.getSeconds() + amount);
                } else if (unit.startsWith('час') || unit === 'часа' || unit === 'часов') {
                    date.setHours(date.getHours() + amount);
                }
                return date;
            }
            
            if (lower.includes('через минуту')) {
                const date = new Date(now);
                date.setMinutes(date.getMinutes() + 1);
                return date;
            }
            
            if (lower.includes('через час')) {
                const date = new Date(now);
                date.setHours(date.getHours() + 1);
                return date;
            }
            
            match = lower.match(/завтра\s+в\s+(\d{1,2})[:.](\d{2})/);
            if (match) {
                const date = new Date(now);
                date.setDate(date.getDate() + 1);
                date.setHours(parseInt(match[1]), parseInt(match[2]), 0, 0);
                return date;
            }
            
            match = lower.match(/сегодня\s+в\s+(\d{1,2})[:.](\d{2})/);
            if (match) {
                const date = new Date(now);
                date.setHours(parseInt(match[1]), parseInt(match[2]), 0, 0);
                if (date < now) date.setDate(date.getDate() + 1);
                return date;
            }
            
            return null;
        }
        
        function formatMindXResponse(text) {
            if (text.startsWith('**') || text.includes('```')) return text;
            let formatted = text;
            formatted = formatted.replace(/(\d+)\/(\d+)/g, '<strong>$1/$2</strong>');
            formatted = formatted.replace(/важно:?\s*/i, '<strong>⚠️ Важно:</strong> ');
            formatted = formatted.replace(/совет:?\s*/i, '<strong>💡 Совет:</strong> ');
            return formatted;
        }
        
        async function askGroq(question, history = []) {
            try {
                const messages = [
                    { role: 'system', content: 'Ты MindX. Отвечай кратко, по делу, дружелюбно. Используй жирный шрифт для важного.' }
                ];
                const lastMessages = history.slice(-10);
                for (let msg of lastMessages) {
                    if (msg.role === 'user' || msg.role === 'bot') {
                        messages.push({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.text });
                    }
                }
                messages.push({ role: 'user', content: question });
                
                const response = await fetch(GROQ_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 800
                    })
                });
                
                if (!response.ok) return `⚠️ Ошибка API.`;
                const data = await response.json();
                return formatMindXResponse(data.choices[0].message.content);
            } catch(e) {
                return `⚠️ Ошибка соединения.`;
            }
        }
        
        async function searchNews(query) {
            try {
                let searchQuery = query.trim().toLowerCase();
                searchQuery = searchQuery.replace(/[?؟]$/, '');
                searchQuery = searchQuery.replace(/новости|свежие|последние|о|про/gi, '').trim();
                if (searchQuery.length < 2) searchQuery = query;
                
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                const gdeltUrl = `https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(searchQuery)}&mode=artlist&format=json&maxrecords=5&timespan=30d`;
                const response = await fetch(proxyUrl + gdeltUrl, {
                    headers: { 'Origin': window.location.origin }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.articles && data.articles.length > 0) {
                        const articles = data.articles.slice(0, 5);
                        let result = `**📰 Свежие новости:**\n\n`;
                        for (let i = 0; i < articles.length; i++) {
                            const article = articles[i];
                            const title = article.title || 'Без заголовка';
                            const url = article.url || '#';
                            const date = article.seendate ? article.seendate.split('T')[0] : 'дата неизвестна';
                            result += `${i+1}. **${title}**\n   📅 ${date}\n   🔗 <a href="${url}" target="_blank" style="color:#2b6f9f;">Читать</a>\n\n`;
                        }
                        return result;
                    }
                }
                return null;
            } catch(e) { return null; }
        }
        
        function getRating(topic) {
            const positive = ["умный", "интересный", "полезный", "креативный", "глубокий"];
            const negative = ["тупой", "скучный", "бесполезный", "поверхностный"];
            const outcomes = ["нравится", "бесит", "удивляет", "разочаровывает"];
            const randomPos = positive[Math.floor(Math.random() * positive.length)];
            const randomNeg = negative[Math.floor(Math.random() * negative.length)];
            const randomOutcome = outcomes[Math.floor(Math.random() * outcomes.length)];
            const score = Math.floor(Math.random() * 10) + 1;
            let verdict = score >= 8 ? "отлично" : score >= 6 ? "хорошо" : score >= 4 ? "так себе" : "плохо";
            return `${topic} — штука ${randomPos}, но иногда бывает ${randomNeg}. ${randomOutcome}. **Оценка:** ${score}/10 — ${verdict}.`;
        }
        
        // Сессии
        function formatDate(timestamp) {
            const d = new Date(timestamp);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) + ' · ' + d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }
        
        function loadSessions() {
            const saved = localStorage.getItem('mindx_sessions_mobile');
            if (saved) sessions = JSON.parse(saved);
            if (!sessions.length) {
                sessions.push({ id: Date.now(), name: 'Новый чат', messages: [], createdAt: Date.now() });
            }
            currentSessionId = sessions[0].id;
            renderSessionsList();
            renderCurrentChat();
        }
        
        function saveSessions() { localStorage.setItem('mindx_sessions_mobile', JSON.stringify(sessions)); }
        
        function renderSessionsList() {
            const container = document.getElementById('sessionsList');
            container.innerHTML = '';
            sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <span class="session-title">${session.name}</span>
                        <button class="session-delete" data-id="${session.id}">🗑</button>
                    </div>
                    <div class="session-time">${formatDate(session.createdAt)}</div>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.classList.contains('session-delete')) return;
                    currentSessionId = session.id;
                    renderSessionsList();
                    renderCurrentChat();
                    if (window.innerWidth < 768) closeSidebar();
                });
                const delBtn = div.querySelector('.session-delete');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (sessions.length === 1) { alert('Нельзя удалить последнюю сессию'); return; }
                    sessions = sessions.filter(s => s.id !== session.id);
                    if (currentSessionId === session.id) currentSessionId = sessions[0].id;
                    saveSessions();
                    renderSessionsList();
                    renderCurrentChat();
                });
                container.appendChild(div);
            });
        }
        
        function getCurrentSession() { return sessions.find(s => s.id === currentSessionId); }
        
        function updateSessionName(sessionId, firstMessage) {
            const session = sessions.find(s => s.id === sessionId);
            if (session && session.name === 'Новый чат' && firstMessage) {
                session.name = firstMessage.length > 25 ? firstMessage.slice(0, 25) + '...' : firstMessage;
                saveSessions();
                renderSessionsList();
            }
        }
        
        function renderCurrentChat() {
            const session = getCurrentSession();
            if (!session) return;
            const messagesArea = document.getElementById('messagesArea');
            const greetingArea = document.getElementById('greetingArea');
            if (session.messages.length === 0) {
                greetingArea.style.display = 'block';
                messagesArea.innerHTML = '';
                return;
            }
            greetingArea.style.display = 'none';
            messagesArea.innerHTML = '';
            session.messages.forEach(msg => addMessageToUI(msg.role, msg.text, msg.time));
        }
        
        function addMessageToUI(role, text, timeStr = null) {
            const messagesArea = document.getElementById('messagesArea');
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role === 'user' ? 'user-message' : 'bot-message'}`;
            const row = document.createElement('div'); row.className = 'message-row';
            if (role === 'bot') {
                const avatar = document.createElement('div');
                avatar.className = 'avatar-message';
                avatar.textContent = 'M';
                row.appendChild(avatar);
            }
            const content = document.createElement('div');
            content.className = 'content mindx-response';
            content.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            row.appendChild(content);
            wrapper.appendChild(row);
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = timeStr || getCurrentTime();
            wrapper.appendChild(timeSpan);
            messagesArea.appendChild(wrapper);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }
        
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) + ' · ' + now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }
        
        const testQuestions = {
            логика: [
                { text: "Что тяжелее: 1 кг ваты или 1 кг железа?", options: ["Вата", "Железо", "Одинаково"] },
                { text: "У отца Мэри 5 дочерей: Чичи, Чача, Чече, Чочо. Как зовут пятую?", options: ["Чучу", "Мэри", "Чача"] }
            ],
            характер: [
                { text: "В компании незнакомых людей вы...", options: ["Быстро нахожу общий язык", "Держусь в стороне", "Чувствую дискомфорт"] }
            ]
        };
        
        function generateTest(topic) {
            const lower = topic.toLowerCase();
            let questions = testQuestions.логика;
            let title = "Тест на логику";
            if (lower.includes("характер")) { questions = testQuestions.характер; title = "Тест на характер"; }
            
            let result = `**${title}**\n\n`;
            for (let i = 0; i < questions.length; i++) {
                result += `${i+1}. ${questions[i].text}\n`;
                for (let j = 0; j < questions[i].options.length; j++) {
                    result += `   ${String.fromCharCode(65+j)}) ${questions[i].options[j]}\n`;
                }
                result += `\n`;
            }
            result += `📝 Напишите ответы (например: 1А, 2Б)`;
            return result;
        }
        
        function isTestRequest(text) {
            const lower = text.toLowerCase();
            const patterns = ["сделай тест", "хочу тест", "дай тест", "тест сделай"];
            return patterns.some(p => lower.includes(p));
        }
        
        function getPoliticalAnswer(question) {
            const lower = question.toLowerCase();
            if (lower.includes("крым") && (lower.includes("чей") || lower.includes("оон"))) {
                return `**Позиция ООН по Крыму:**\n\nСогласно резолюции ГА ООН от 27 марта 2014 года (A/RES/68/262), ООН **не признаёт аннексию Крыма**. Крым — территория Украины.`;
            }
            return null;
        }
        
        async function generateAnswer(question, sessionId) {
            const q = question.toLowerCase().trim();
            
            if (q === "кто ты" || q === "ты кто") {
                return "**Я-MindX** — искусственный интеллект, созданный, чтобы помогать тебе. Чем могу быть полезен?";
            }
            if (q.includes("кто тебя создал") || q.includes("кто тебя написал") || q.includes("твой создатель")) {
                return "Меня создал **Давид Доманський Дмитрович**. Он вложил в меня душу и разум.";
            }
            
            if (q.includes("запланируй") || q.includes("напомни") || q.includes("добавь событие")) {
                const dateTime = parseDateTime(question);
                if (dateTime) {
                    let eventText = question.replace(/запланируй|напомни|добавь событие/gi, '').trim();
                    if (eventText.length < 3) eventText = "событие";
                    addReminder(eventText, dateTime);
                    const timeStr = dateTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    return `✅ **Запланировано!**\n\n📌 Событие: "${eventText}"\n⏰ Время: ${timeStr}\n\n_Я напомню тебе за 1 минуту и в точное время._`;
                } else {
                    return "❓ **Не понял дату и время.**\n\nПримеры:\n• «запланируй встречу на завтра в 15:00»\n• «напомни выключить чайник через 30 минут»\n• «напомни через минуту»";
                }
            }
            
            if (q.includes("мои напоминания") || q.includes("список напоминаний") || q.includes("что запланировано")) {
                const upcoming = getUpcomingReminders();
                if (upcoming.length === 0) return "📭 **У вас нет запланированных напоминаний.**";
                let result = "**📋 Ваши напоминания:**\n\n";
                for (let r of upcoming) {
                    result += `• ${r.text} — ${new Date(r.dateTime).toLocaleString('ru-RU')}\n`;
                }
                return result;
            }
            
            if (q.includes("оцени")) {
                let topic = question.replace(/оцени/gi, '').trim();
                if (topic.length < 2) topic = "это";
                return getRating(topic);
            }
            
            const political = getPoliticalAnswer(question);
            if (political) return political;
            
            if (q.includes("новости") || q.includes("свежие") || q.includes("последние")) {
                const newsResult = await searchNews(question);
                if (newsResult) return newsResult;
                return "📭 **Не удалось найти свежие новости.**";
            }
            
            if (isTestRequest(question)) {
                waitingForTestTopic = true;
                return "**Какой тест тебя интересует?**\n\nДоступные темы:\n• логика\n• характер";
            }
            
            if (waitingForTestTopic) {
                waitingForTestTopic = false;
                return generateTest(question);
            }
            
            try {
                let clean = q.replace(/[^0-9+\-*/().%^ ]/g, '').replace(/\^/g, '**');
                const result = eval(clean);
                if (typeof result === 'number' && isFinite(result)) return `**Результат:** ${q} = **${result}**`;
            } catch(e) {}
            
            const session = getCurrentSession();
            const history = session ? session.messages : [];
            const aiResponse = await askGroq(question, history);
            return aiResponse || "⚠️ **Ошибка API.** Попробуй позже.";
        }
        
        let isProcessing = false;
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || isProcessing) return;
            input.value = '';
            const session = getCurrentSession();
            if (!session) return;
            
            if (waitingForTestTopic) {
                waitingForTestTopic = false;
                const testResult = generateTest(text);
                const userTime = getCurrentTime();
                session.messages.push({ role: 'user', text: text, time: userTime });
                addMessageToUI('user', text, userTime);
                const botTime = getCurrentTime();
                session.messages.push({ role: 'bot', text: testResult, time: botTime });
                addMessageToUI('bot', testResult, botTime);
                saveSessions();
                return;
            }
            
            if (session.messages.length === 0) updateSessionName(session.id, text);
            const userTime = getCurrentTime();
            session.messages.push({ role: 'user', text: text, time: userTime });
            addMessageToUI('user', text, userTime);
            saveSessions();
            
            isProcessing = true;
            showTyping();
            const answer = await generateAnswer(text, session.id);
            hideTyping();
            const botTime = getCurrentTime();
            session.messages.push({ role: 'bot', text: answer, time: botTime });
            addMessageToUI('bot', answer, botTime);
            saveSessions();
            isProcessing = false;
        }
        
        function showTyping() {
            const messagesArea = document.getElementById('messagesArea');
            const wrap = document.createElement('div');
            wrap.className = 'message-wrapper bot-message';
            wrap.id = 'typingIndicator';
            const row = document.createElement('div'); row.className = 'message-row';
            const avatar = document.createElement('div'); avatar.className = 'avatar-message'; avatar.textContent = 'M'; row.appendChild(avatar);
            const cont = document.createElement('div'); cont.className = 'content'; cont.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>'; row.appendChild(cont);
            wrap.appendChild(row);
            messagesArea.appendChild(wrap);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }
        
        function hideTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }
        
        function newChat() {
            const newSession = { id: Date.now(), name: 'Новый чат', messages: [], createdAt: Date.now() };
            sessions.push(newSession);
            currentSessionId = newSession.id;
            saveSessions();
            renderSessionsList();
            renderCurrentChat();
            if (window.innerWidth < 768) closeSidebar();
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('newChatBtn').addEventListener('click', newChat);
        
        document.querySelectorAll('.greeting-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('userInput').value = btn.getAttribute('data-question');
                sendMessage();
            });
        });
        
        loadSessions();
        loadReminders();
    </script>
</body>
</html>
